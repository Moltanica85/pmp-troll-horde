<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PMP: Horda Troli - Wersja Stabilna 2D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; padding: 0; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

// Globalne zmienne stanu gry
let globalVolume = 0.3;
let music1 = null;
let music2 = null;

// Definicje 3 poziomów gry
const LEVELS = [
    { index: 1, name: "Level 1 — Ścieżka Białego Wejścia", horde: 20, bg: "tlolv1" },
    { index: 2, name: "Level 2 — Kamienna Przełęcz", horde: 35, bg: "tlolv2" },
    { index: 3, name: "Level 3 — Mchowy Amfiteatr", horde: 50, bg: "tlolv3" }
];

// 1. Scena Ładowania i Diagnostyki (BootScene)
class BootScene extends Phaser.Scene {
    constructor() { super('BootScene'); }

    preload() {
        // Tła dla wszystkich poziomów
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tlolv1', 'assets/tlolv1.jpeg');
        this.load.image('tlolv2', 'assets/tlolv2.jpeg');
        this.load.image('tlolv3', 'assets/tlolv3.jpeg');
        
        // Obiekty i ikony
        this.load.image('hpower2', 'assets/hpower2.png');
        this.load.image('opower1', 'assets/opower1.png');

        // 4) Zabezpieczenie przed duplikatami - czyszczenie tekstury przed załadowaniem
        if (this.textures.exists('hero_sheet')) this.textures.remove('hero_sheet');
        if (this.textures.exists('troll')) this.textures.remove('troll');

        // Ładowanie spritesheetu bohatera zgodnie ze ścisłą specyfikacją 600x600 px (120x120 klatka)
        this.load.spritesheet('hero_sheet', 'assets/bh1run.png', { frameWidth: 120, frameHeight: 120, margin: 0, spacing: 0 });
        
        // 1) Próba załadowania troll.png oraz przygotowanie awaryjnego kształtu na wypadek 404
        this.load.spritesheet('troll', 'assets/troll.png', { frameWidth: 64, frameHeight: 64, margin: 0, spacing: 0 });

        // Pliki audio
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
    }

    create() {
        // 2) Pobranie rzeczywistej liczby klatek z tekstury
        const heroTexture = this.textures.get('hero_sheet');
        const frameCount = heroTexture ? heroTexture.frameTotal : 0;
        console.log('hero_sheet frames:', frameCount); // Debug diagnostyczny w konsoli

        // Dynamiczne dopasowanie zakresu końcowego, eliminujące crashe pętli logicznej przy frameCount === 26
        if (frameCount > 0) {
            const endFrame = frameCount - 1;
            this.anims.create({
                key: 'hero-run',
                frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: endFrame }),
                frameRate: 24,
                repeat: -1
            });
        } else {
            console.error('hero_sheet nie załadowany poprawnie');
        }

        // 1) Bezpieczna weryfikacja tekstury trolla przed utworzeniem animacji run
        if (this.textures.exists('troll')) {
            const trollTexture = this.textures.get('troll');
            const trollFrames = trollTexture ? trollTexture.frameTotal : 0;
            
            this.anims.create({
                key: 'troll-run',
                frames: this.anims.generateFrameNumbers('troll', { start: 0, end: Math.min(24, trollFrames - 1) }),
                frameRate: 16,
                repeat: -1
            });
        } else {
            console.warn('Texture "troll" not found — skipping anim creation to prevent crash');
        }

        this.scene.start("StartScene");
    }
}

// 2. Menu Główne (StartScene)
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }

    create() {
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);

        let btnArea = this.add.rectangle(640, 400, 320, 80, 0x000000, 0.8).setInteractive({ useHandCursor: true }).setStrokeStyle(4, 0xffffff);
        this.add.text(640, 400, "START GRY", { fontSize: '42px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);

        btnArea.on('pointerdown', () => {
            btnArea.disableInteractive();
            if (this.sound.context && this.sound.context.state === 'suspended') {
                this.sound.context.resume();
            }
            if (!music1) music1 = this.sound.add('track1', { loop: true, volume: globalVolume });
            if (!music1.isPlaying) music1.play();
            
            this.scene.start("GameScene", { levelIndex: 0 });
        });

        // Suwak Głośności
        this.add.text(640, 540, "GŁOŚNOŚĆ", { fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        this.add.rectangle(640, 580, 200, 10, 0x333333); 
        let handle = this.add.circle(540 + (globalVolume * 200), 580, 15, 0xffffff).setInteractive({ useHandCursor: true });
        
        this.input.setDraggable(handle);
        this.input.on('drag', (pointer, gameObject, dragX) => {
            dragX = Phaser.Math.Clamp(dragX, 540, 740);
            gameObject.x = dragX;
            globalVolume = (dragX - 540) / 200;
            this.sound.setVolume(globalVolume);
        });
    }
}

// 3. Scena Rozgrywki (GameScene)
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }

    init(data) {
        this.levelIndex = (data && data.levelIndex !== undefined) ? data.levelIndex : 0;
        this.levelData = LEVELS[this.levelIndex];
        this.currentLevel = this.levelData.index;
        this.powerCooldown = false;
        this.shootCooldown = false;
    }

    create() {
        if (music1 && music1.isPlaying) music1.stop();
        if (!music2) music2 = this.sound.add('track2', { loop: true, volume: globalVolume });
        try { if (!music2.isPlaying) music2.play(); } catch (e) {}

        this.add.image(640, 360, this.levelData.bg).setDisplaySize(1280, 720);

        // 4) Utworzenie pojedynczego sprite bohatera z indeksem klatki 0 (brak duplikatów tile-duplication)
        this.hero = this.physics.add.sprite(100, 420, 'hero_sheet', 0);
        this.hero.setOrigin(0.5, 1);
        this.hero.setScale(1);
        this.hero.setCollideWorldBounds(true);
        
        // Precyzyjny hitbox bohatera wycentrowany wewnątrz klatki 120x120
        this.hero.setSize(40, 90);
        this.hero.setOffset((120 - 40) / 2, 120 - 90 - 4);
        
        // 3) Bezpieczna weryfikacja przed wywołaniem play(), zapobiegająca błędowi duration
        if (this.anims.exists('hero-run')) {
            this.hero.play('hero-run');
        } else {
            console.error('Animacja hero-run nie istnieje — nie odpalam play()');
        }

        // 5) Grupa trolli z automatycznym czyszczeniem, update oraz max rozmiarem puli 50
        this.trolls = this.physics.add.group({ 
            classType: Phaser.Physics.Arcade.Sprite, 
            runChildUpdate: true, 
            maxSize: 50 
        });

        this.bullets = this.physics.add.group();

        this.trollsLeft = this.levelData.horde;
        this.trollsSpawned = 0;
        
        this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { 
            fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 5 
        });

        // Spawner wywołujący dedykowaną funkcję spawnTroll
        this.spawnTimer = this.time.addEvent({ 
            delay: 2000, callback: this.spawnTrollCall, callbackScope: this, loop: true 
        });

        this.physics.add.collider(this.bullets, this.trolls, this.hitTroll, null, this);
        this.physics.add.overlap(this.hero, this.trolls, this.playerHit, null, this);

        this.cursors = this.input.keyboard.createCursorKeys();
        
        // Klawisze sterowania akcjami gry (K oraz L)
        this.keys = this.input.keyboard.addKeys({ shoot: 'K', power: 'L' });
    }

    // Wywołanie spawnu obsługujące parametry domyślne współrzędnych ekranu
    spawnTrollCall() {
        this.spawnTroll(1350, 560);
    }

    // 5) Metoda zaawansowanego spawnu i bezpiecznego odzyskiwania (reuse) instancji ciał z puli
    spawnTroll(x = 1350, y = 560) {
        if (this.trollsSpawned >= this.levelData.horde) return;

        const level = this.currentLevel || 1;

        // Zapobieganie nakładaniu się spawnów w tym samym punkcie przestrzeni
        this.trolls.children.iterate(troll => {
            if (troll && troll.active && Math.abs(troll.x - x) < 80) {
                x += Phaser.Math.Between(70, 120);
            }
        });

        // Sprawdzenie czy tekstura trolla istnieje, jeśli nie (404) - funkcja przerywa spawn, chroniąc silnik przed crashem
        if (!this.textures.exists('troll')) {
            console.warn('Spawn aborted: Texture "troll" is missing due to 404 error.');
            return;
        }

        let t = this.trolls.get(x, y, 'troll');
        if (!t) return;

        // Aktywacja ciała fizycznego i widoczności
        t.enableBody(true, x, y, true, true);
        t.setActive(true);
        t.setVisible(true);
        t.setOrigin(0.5, 1);
        t.setScale(1.5);
        
        // Definiowanie sztywnego, łatwego do trafienia hitboxa
        t.setSize(40, 80);
        t.setOffset(12, 8);
        
        // Zależność punktów życia przeciwnika od aktualnego poziomu (Lvl 2 = 2HP, Lvl 3 = 3HP, Lvl 1 = 1HP)
