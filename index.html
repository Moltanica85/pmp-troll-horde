<html lang="pl">

    <title>PMP: Horda Troli - Wersja Stabilna 2D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; padding: 0; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

// Globalne zmienne stanu gry
let globalVolume = 0.3;
let music1 = null;
let music2 = null;

// Definicje 3 poziomów z unikalnymi parametrami
const LEVELS = [
    { index: 1, name: "Level 1 — Ścieżka Białego Wejścia", horde: 20, bg: "tlolv1" },
    { index: 2, name: "Level 2 — Kamienna Przełęcz", horde: 35, bg: "tlolv2" },
    { index: 3, name: "Level 3 — Mchowy Amfiteatr", horde: 50, bg: "tlolv3" }
];

// 1. Scena Ładowania (BootScene)
class BootScene extends Phaser.Scene {
    constructor() { super('BootScene'); }

    preload() {
        // Tła dla poziomów
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tlolv1', 'assets/tlolv1.jpeg');
        this.load.image('tlolv2', 'assets/tlolv2.jpeg');
        this.load.image('tlolv3', 'assets/tlolv3.jpeg');
        
        // Obiekty i ikony
        this.load.image('hpower2', 'assets/hpower2.png');
        this.load.image('opower1', 'assets/opower1.png');

        // Zabezpieczenie przed duplikatami w pamięci podręcznej
        if (this.textures.exists('hero_sheet')) this.textures.remove('hero_sheet');
        if (this.textures.exists('troll')) this.textures.remove('troll');

        // ✔️ PRAWDZIWE WARTOŚCI: Obraz 600x600 px / siatka 5x5 = klatka 120x120 px
        this.load.spritesheet('hero_sheet', 'assets/bh1run.png', { frameWidth: 120, frameHeight: 120, margin: 0, spacing: 0 });
        
        // Spritesheet trolla zgodnie z wytycznymi
        this.load.spritesheet('troll', 'assets/troll.png', { frameWidth: 64, frameHeight: 64, margin: 0, spacing: 0 });

        // Pliki audio
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
    }

    create() {
        // Logowanie liczby klatek bohatera w konsoli
        const frameCount = this.textures.get('hero_sheet').frameTotal;
        console.log('hero_sheet frames:', frameCount); // oczekiwane: 25

        // Tworzenie animacji biegu na pełne 25 klatek (0 do 24)
        if (frameCount >= 25) {
            this.anims.create({
                key: 'hero-run',
                frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: 24 }),
                frameRate: 24,
                repeat: -1
            });
        } else {
            console.error('Za mało klatek w hero_sheet. Sprawdź plik PNG.');
            this.anims.create({
                key: 'hero-run',
                frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: frameCount - 1 }),
                frameRate: 14,
                repeat: -1
            });
        }

        // Animacja biegu trolla
        const trollFrames = this.textures.get('troll') ? this.textures.get('troll').frameTotal : 0;
        this.anims.create({
            key: 'troll-run',
            frames: this.anims.generateFrameNumbers('troll', { start: 0, end: Math.min(24, trollFrames - 1) }),
            frameRate: 16,
            repeat: -1
        });

        this.scene.start("StartScene");
    }
}

// 2. Menu Główne (StartScene)
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }

    create() {
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);

        let btnArea = this.add.rectangle(640, 400, 320, 80, 0x000000, 0.8).setInteractive({ useHandCursor: true }).setStrokeStyle(4, 0xffffff);
        this.add.text(640, 400, "START GRY", { fontSize: '42px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);

        btnArea.on('pointerdown', () => {
            btnArea.disableInteractive();
            if (this.sound.context && this.sound.context.state === 'suspended') {
                this.sound.context.resume();
            }
            if (!music1) music1 = this.sound.add('track1', { loop: true, volume: globalVolume });
            if (!music1.isPlaying) music1.play();
            
            this.scene.start("GameScene", { levelIndex: 0 });
        });

        // Suwak Głośności
        this.add.text(640, 540, "GŁOŚNOŚĆ", { fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        this.add.rectangle(640, 580, 200, 10, 0x333333); 
        let handle = this.add.circle(540 + (globalVolume * 200), 580, 15, 0xffffff).setInteractive({ useHandCursor: true });
        
        this.input.setDraggable(handle);
        this.input.on('drag', (pointer, gameObject, dragX) => {
            dragX = Phaser.Math.Clamp(dragX, 540, 740);
            gameObject.x = dragX;
            globalVolume = (dragX - 540) / 200;
            this.sound.setVolume(globalVolume);
        });
    }
}

// 3. Scena Rozgrywki (GameScene)
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }

    init(data) {
        this.levelIndex = (data && data.levelIndex !== undefined) ? data.levelIndex : 0;
        this.levelData = LEVELS[this.levelIndex];
        this.currentLevel = this.levelData.index;
        this.powerCooldown = false;
        this.shootCooldown = false;
    }

    create() {
        if (music1 && music1.isPlaying) music1.stop();
        if (!music2) music2 = this.sound.add('track2', { loop: true, volume: globalVolume });

        this.add.image(640, 360, this.levelData.bg).setDisplaySize(1280, 720);

        // ✔️ UTWORZENIE POJEDYNCZEGO BOHATERA
        this.hero = this.physics.add.sprite(100, 420, 'hero_sheet', 0);
        this.hero.setOrigin(0.5, 1);
        this.hero.setScale(1);
        this.hero.setCollideWorldBounds(true);
        
        // ✔️ PRECYZYJNY HITBOX BOHATERA
        this.hero.setSize(40, 90);
        this.hero.setOffset((120 - 40) / 2, 120 - 90 - 4);
        
        // Odpalenie animacji biegu po sprawdzeniu, czy istnieje
        if (this.anims.exists('hero-run')) {
            this.hero.play('hero-run');
        }

        // ✔️ GRUPA TROLLI Z REUSE I MAXSIZE = 50
        this.trolls = this.physics.add.group({ 
            classType: Phaser.Physics.Arcade.Sprite, 
            runChildUpdate: true, 
            maxSize: 50 
        });

        this.bullets = this.physics.add.group();

        this.trollsLeft = this.levelData.horde;
        this.trollsSpawned = 0;
        
        this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { 
            fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 5 
        });

        // Spawner trolli wywołujący stabilną funkcję
        this.spawnTimer = this.time.addEvent({ 
            delay: 2000, callback: this.spawnTrollCall, callbackScope: this, loop: true 
        });

        this.physics.add.collider(this.bullets, this.trolls, this.hitTroll, null, this);
        this.physics.add.overlap(this.hero, this.trolls, this.playerHit, null, this);

        this.cursors = this.input.keyboard.createCursorKeys();
        
        // ✔️ STEROWANIE KLAWIATURĄ K I L
        this.keys = this.input.keyboard.addKeys({ shoot: 'K', power: 'L' });
    }

    spawnTrollCall() {
        this.spawnTroll(1350, 560);
    }

    // ✔️ SPAWN I RESPAWN TROLLI (PULA REUSE)
    spawnTroll(x = 1350, y = 560) {
        if (this.trollsSpawned >= this.levelData.horde) return;

        const level = this.currentLevel || 1;

        // Zapobieganie nakładaniu spawnów
        this.trolls.children.iterate(troll => {
            if (troll && troll.active && Math.abs(troll.x - x) < 80) {
                x += Phaser.Math.Between(70, 130);
            }
        });

        let t = this.trolls.get(x, y, 'troll');
        if (!t) return;

        // Reaktywacja ciał z puli za pomocą enableBody
        t.enableBody(true, x, y, true, true);
        t.setActive(true);
        t.setVisible(true);
        t.setOrigin(0.5, 1);
        t.setScale(1.5);
        
        t.setSize(40, 80);
        t.setOffset(12, 8);
        
        // ✔️ PUNKTY HP ZALEŻNE OD POZIOMU
        t.hp = level === 2 ? 2 : level === 3 ? 3 : 1;
        
        t.body.immovable = false;
        t.body.moves = true;
        
        // Ruch w lewo w stronę gracza

            t.play('troll-run', true);
        }

        this.trollsSpawned++;
    }

    // ✔️ SKUTECZNE TRAFIENIE I DESPAWN DO PULI REUSE
    hitTroll(bullet, troll) {
        bullet.destroy();
        if (!troll.active) return;

        troll.hp--;
        troll.setTint(0xff5555);
        this.time.delayedCall(100, () => { if (troll.active) troll.clearTint(); });

        if (troll.hp <= 0) {
            troll.disableBody(true, true); // Schowanie i zwrot do puli
            this.trollsLeft--;
            this.uiText.setText(`${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`);
            
            if (this.trollsLeft <= 0) {
                this.checkVictory();
            }
        } else {
            troll.setVelocityX(-200);
            this.time.delayedCall(200, () => {
                if (troll && troll.active && troll.body) troll.setVelocityX(-120);
            });
        }
    }

    shoot() {
        if (this.shootCooldown || !this.hero || !this.hero.active) return;
        this.shootCooldown = true;

        let bullet = this.bullets.create(this.hero.x + 30, this.hero.y - 50, 'hpower2');
        if (bullet) {
            bullet.setDisplaySize(40, 40);
            bullet.body.setSize(30, 30);
            bullet.setVelocityX(600);
        }

        this.time.delayedCall(350, () => this.shootCooldown = false);
    }

        this.powerCooldown = true;
        
        this.trolls.children.iterate(t => {

        // Pojedynczy sprajt bohatera (klatka startowa 0)
        this.hero = this.physics.add.sprite(100, 450, 'hero_sheet', 0);
        this.hero.setOrigin(0.5, 1);
        this.hero.setScale(1);
        this.hero.setCollideWorldBounds(true);
        
        // Stabilny hitbox wycentrowany w ramce 120x120px

        this.hero.setOffset((120 - 40) / 2, 120 - 90 - 4);

        // Grupa trolli (maksymalny rozmiar puli reuse = 50)
        this.trolls = this.physics.add.group({ 
            classType: Phaser.Physics.Arcade.Sprite, 
            runChildUpdate: true, 
            maxSize: 50 
        });

        this.bullets = this.physics.add.group();

        this.trollsLeft = this.levelData.horde;
        this.trollsSpawned = 0;
        
        this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { 
            fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 5 
        });

        // Cykliczny spawner trolli co 2 sekundy
        this.spawnTimer = this.time.addEvent({ 
            delay: 2000, callback: this.spawnTrollCall, callbackScope: this, loop: true 
        });

        this.physics.add.collider(this.bullets, this.trolls, this.hitTroll, null, this);
        this.physics.add.overlap(this.hero, this.trolls, this.playerHit, null, this);

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys({ shoot: 'K', power: 'L' });
    }

        this.spawnTroll(1350, 560);
    }

    spawnTroll(x = 1350, y = 560) {
        if (this.trollsSpawned >= this.levelData.horde) return;

        const level = this.currentLevel || 1;

        // Zapobieganie nakładaniu się spawnów przeciwników
        this.trolls.children.iterate(troll => {
            if (troll && troll.active && Math.abs(troll.x - x) < 80) {
                x += Phaser.Math.Between(70, 130);
            }
        });

        let t = this.trolls.get(x, y, 'troll');
        if (!t) return;

        t.enableBody(true, x, y, true, true);

        t.setOrigin(0.5, 1);
        t.setScale(1.5);

        t.setOffset(12, 8);

        t.setFlipX(true);
        
        if (this.anims.exists('troll-run')) {
            t.play('troll-run', true);
        }
        
        console.log('Spawned troll, hp:', t.hp);
        this.trollsSpawned++;

        if (!troll.active) return;

        troll.hp--;
        troll.setTint(0xff5555);

            this.trollsLeft--;

            });

        this.trolls.children.iterate(t => { 
            if (t && t.active && t.body) {
                t.setVelocityX(-300); 
            }
        });

        this.time.delayedCall(2000, () => {
            this.powerCooldown = false;
        });
    }

    playerHit() {
        if (this.spawnTimer) this.spawnTimer.destroy();
        if (music2 && music2.isPlaying) music2.stop();
        this.scene.start("GameOverScene");
    }

    checkVictory() {
        if (this.spawnTimer) this.spawnTimer.destroy();
        if (this.levelIndex < LEVELS.length - 1) {
            this.scene.start("GameScene", { levelIndex: this.levelIndex + 1 });
        } else {
            this.scene.start("WinScene");
        }
    }

    update() {
        if (!this.hero || !this.hero.body) return;
        
        let moving = false;
        this.hero.setVelocity(0);

        if (this.sound.context && this.sound.context.state === 'suspended') {
            this.sound.context.resume();
        }

        // Ruch horyzontalny gracza
        if (this.cursors.left.isDown) { 
            this.hero.setVelocityX(-280); 
            moving = true;
        } else if (this.cursors.right.isDown) { 
            this.hero.setVelocityX(280); 
            moving = true;
        }
        
        // Ruch wertykalny gracza
        if (this.cursors.up.isDown) {
            this.hero.setVelocityY(-280);
            moving = true;
        } else if (this.cursors.down.isDown) {
            this.hero.setVelocityY(280);
            moving = true;
        }

        // Obsługa strzału (K) oraz tarczy (L)
        if (Phaser.Input.Keyboard.JustDown(this.keys.shoot)) { 
            this.shoot(); 
        }
        if (this.keys.power.isDown && !this.powerCooldown) { 
            this.usePower(); 
        }

        // ✅ NAPRAWIONO STANY ANIMACJI: Jeśli bohater idzie – biega płynnie. Jeśli stoi – zatrzymuje się na klatce 0.
        if (moving) {
            if (this.anims.exists('hero-run') && !this.hero.anims.isPlaying) {
                this.hero.play('hero-run');
            }
        } else {
            this.hero.anims.stop();
            this.hero.setFrame(0); // Czysta i stabilna stojąca klatka bez zapętlania w miejscu
        }

        // Wymuszanie stałej prędkości poruszania się hordy
        this.trolls.children.iterate(t => {
            if (!t || !t.active || !t.body) return;
            if (Math.abs(t.body.velocity.x) < 1) {
                t.setVelocityX(-120);
            }
            if (t.x < -100) {
                t.disableBody(true, true);
            }
        });
    }
}

// 4. Ekran Końca Gry (GameOverScene)
class GameOverScene extends Phaser.Scene { 
    constructor() { super("GameOverScene"); } 
    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.85);
        this.add.text(640, 300, "KONIEC GRY\nTwoja twarz została skradziona!", { 
            align: 'center', fontSize: '42px', fill: '#ff5555', fontStyle: 'bold', fontFamily: 'Arial' 
        }).setOrigin(0.5);
        
        let btn = this.add.rectangle(640, 460, 320, 60, 0xffffff).setInteractive({ useHandCursor: true });
        this.add.text(640, 460, "MENU GŁÓWNE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        btn.on('pointerdown', () => this.scene.start("StartScene"));
    }
}

// 5. Ekran Wygranej (WinScene)
class WinScene extends Phaser.Scene { 
    constructor() { super("WinScene"); } 
    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.9);
        this.add.text(640, 180, "🎉 GRATULACJE! 🎉", { fontSize: '64px', fill: '#55ff55', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        this.add.text(640, 280, "Udało Ci się przejść wszystkie poziomy hordy!", { align: 'center', fontSize: '28px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        
        let btnRepeat = this.add.rectangle(640, 440, 320, 70, 0x55ff55).setInteractive({ useHandCursor: true });
        this.add.text(640, 440, "ZAGRAJ PONOWNIE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        btnRepeat.on('pointerdown', () => this.scene.start("GameScene", { levelIndex: 0 }));
    }
}

const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 1280, height: 720 },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, StartScene, GameScene, GameOverScene, WinScene]
};

const game = new Phaser.Game(config);
