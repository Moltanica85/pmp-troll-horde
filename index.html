<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PMP: Horda Troli - Wersja Mobilna 2D</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; padding: 0; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

// Globalne zmiennes stanu gry
let globalVolume = 0.3;
let music1 = null;
let music2 = null;

// Definicje 3 poziomów z unikalnymi zestawami trolli
const LEVELS = [
    { name: "Level 1 — Ścieżka Białego Wejścia", horde: 20, types: ["tb1", "tb2", "tb3"], bg: "tlolv1" },
    { name: "Level 2 — Kamienna Przełęcz", horde: 35, types: ["tk1", "tk2", "tk3"], bg: "tlolv2" },
    { name: "Level 3 — Mchowy Amfiteatr", horde: 50, types: ["tm1", "tm2", "tm3"], bg: "tlolv3", boss: true }
];

// 1. Scena Ładowania (BootScene)
class BootScene extends Phaser.Scene {
    constructor() { super("BootScene"); }

    preload() {
        // Tła menu i poziomów
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tlolv1', 'assets/tlolv1.jpeg');
        this.load.image('tlolv2', 'assets/tlolv2.jpeg');
        this.load.image('tlolv3', 'assets/tlolv3.jpeg');
        
        // Ataki i ikony
        this.load.image('hpower2', 'assets/hpower2.png');
        this.load.image('opower1', 'assets/opower1.png');

        // BOHATER GŁÓWNY - Spritesheet ruchu bh1run.png (klatki 200x200 px)
        this.load.spritesheet('hero_sheet', 'assets/bh1run.png', { frameWidth: 200, frameHeight: 200 });

        // TROLE - Poziom 1 (tb), Poziom 2 (tk), Poziom 3 (tm)
        this.load.image('tb1', 'assets/tb1.png');
        this.load.image('tb2', 'assets/tb2.png');
        this.load.image('tb3', 'assets/tb3.png');
        
        this.load.image('tk1', 'assets/tk1.png');
        this.load.image('tk2', 'assets/tk2.png');
        this.load.image('tk3', 'assets/tk3.png');
        
        this.load.image('tm1', 'assets/tm1.png');
        this.load.image('tm2', 'assets/tm2.png');
        this.load.image('tm3', 'assets/tm3.png');

        // Pliki audio
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
    }

    create() {
        // NAPRAWIONO: Definicje animacji dopasowane wyłącznie do realnych klatek 0-7 z bh1run.png
        this.anims.create({ 
            key: 'run',  
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: 7 }), 
            frameRate: 10, 
            repeat: -1 
        });
        
        this.anims.create({ 
            key: 'idle', 
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: 3 }), 
            frameRate: 4, 
            repeat: -1 
        });

        this.anims.create({ 
            key: 'atk', 
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 4, end: 7 }), 
            frameRate: 12,
            repeat: 0
        });

        this.anims.create({
            key: 'hero-power',
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 4, end: 7 }),
            frameRate: 12,
            repeat: 0
        });

        this.scene.start("StartScene");
    }
}

// 2. Menu Główne (StartScene)
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }

    create() {
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);

        if (!music1) {
            music1 = this.sound.add('track1', { loop: true, volume: globalVolume });
        }
        
        try {
            if (!music1.isPlaying) music1.play();
        } catch (e) {}

        // Przycisk START GRY
        let btnArea = this.add.rectangle(640, 400, 320, 80, 0x000000, 0.8).setInteractive({ useHandCursor: true }).setStrokeStyle(4, 0xffffff);
        this.add.text(640, 400, "START GRY", { fontSize: '42px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);

        btnArea.on('pointerdown', () => {
            btnArea.disableInteractive();
            try {
                if (music1 && music1.isPlaying) music1.stop();
            } catch (e) {}
            this.scene.start("GameScene", { levelIndex: 0 });
        });

        // Suwak Głośności
        this.add.text(640, 540, "GŁOŚNOŚĆ", { fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        this.add.rectangle(640, 580, 200, 10, 0x333333); 
        let handle = this.add.circle(540 + (globalVolume * 200), 580, 15, 0xffffff).setInteractive({ useHandCursor: true });
        
        this.input.setDraggable(handle);
        this.input.on('drag', (pointer, gameObject, dragX) => {
            dragX = Phaser.Math.Clamp(dragX, 540, 740);
            gameObject.x = dragX;
            globalVolume = (dragX - 540) / 200;
            this.sound.setVolume(globalVolume);
        });
    }
}

// 3. Scena Rozgrywki (GameScene)
class GameScene extends Phaser.Scene {
    constructor() { 
        super("GameScene"); 
    }

    init(data) {
        this.levelIndex = (data && data.levelIndex !== undefined) ? data.levelIndex : 0;
        this.levelData = LEVELS[this.levelIndex];
        this.powerCooldown = false;
    }

    create() {
        if (music1 && music1.isPlaying) music1.stop();
        
        if (!music2) {
            music2 = this.sound.add('track2', { loop: true, volume: globalVolume });
        }
        
        try {
            if (!music2.isPlaying) music2.play();
        } catch (e) {}

        this.add.image(640, 360, this.levelData.bg).setDisplaySize(1280, 720);

        // Bohater
        this.player = this.physics.add.sprite(200, 450, 'hero_sheet');
        this.player.setCollideWorldBounds(true);
        this.player.setScale(0.9);
        
        // NAPRAWIONO: Dokładne wymiary hitboxów i wycięcie klatek bohatera
        this.player.body.setSize(40, 90);
        this.player.body.setOffset(44, 20);
        
        this.player.play('idle');

        // Grupy fizyczne
        this.trolls = this.physics.add.group();
        this.powers = this.physics.add.group();

        this.trollsLeft = this.levelData.horde;
        this.trollsSpawned = 0;
        
        this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { 
            fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 5 
        });

        this.spawnTimer = this.time.addEvent({ 
            delay: 1400, callback: this.spawnTroll, callbackScope: this, loop: true 
        });

        // Kolizje i nakładanie obiektów
        this.physics.add.overlap(this.player, this.trolls, this.playerHit, null, this);
        this.physics.add.overlap(this.powers, this.trolls, this.powerHit, null, this);

        // Dotyk mobilny i klawiatura
        this.input.on('pointerdown', (p) => this.firePower(p.x, p.y));
        this.cursors = this.input.keyboard.createCursorKeys();

        // Dodanie obsługi klawiszy K i L
        this.keys = this.input.keyboard.addKeys({ shoot: 'K', power: 'L' });
    }

    spawnTroll() {
        if (this.trollsSpawned >= this.levelData.horde) return;
        
        let type = Phaser.Utils.Array.GetRandom(this.levelData.types);
        let spawnY = Phaser.Math.Between(220, 640);
        let troll = this.trolls.create(1350, spawnY, type);
        
        if (troll) {
            troll.setDisplaySize(90, 90);
            troll.body.setSize(60, 60);
            troll.body.setOffset(15, 15);
            troll.type = type;

            // NAPRAWIONO: Trole biegną przodem do gracza (w lewo = flipX true)
            troll.setFlipX(true); 

            // NAPRAWIONO: HP zależne od numeru poziomu (Lvl 1 = 1HP, Lvl 2 = 2HP, Lvl 3 = 3HP)
            troll.hp = this.levelIndex + 1;

            // Prędkości trolli
            if (type.startsWith('tb')) troll.setVelocityX(-170);
            if (type.startsWith('tk')) troll.setVelocityX(-110);
            if (type.startsWith('tm')) troll.setVelocityX(-220);

            this.trollsSpawned++;
        }
    }

    firePower(targetX, targetY) {
        if (!this.player || !this.player.active) return;
        
        this.player.play('atk', true);
        this.player.chain('idle');

        let projectile = this.powers.create(this.player.x + 40, this.player.y, 'hpower2');
        if (projectile) {
            projectile.setDisplaySize(60, 60);
            this.physics.moveTo(projectile, targetX, targetY, 550);
        }
    }

    shootStraight() {
        if (!this.player || !this.player.active) return;
        
        this.player.play('atk', true);
        this.player.chain('idle');

        let targetX = this.player.flipX ? this.player.x - 200 : this.player.x + 200;
        let projectile = this.powers.create(this.player.x + (this.player.flipX ? -40 : 40), this.player.y, 'hpower2');
        if (projectile) {
            projectile.setDisplaySize(60, 60);
            this.physics.moveTo(projectile, targetX, this.player.y, 550);
        }
    }

    // Nowa funkcja fali odpychającej (Klawisz L)
    usePower() {
        this.powerCooldown = true;
        this.player.play('hero-power', true);
        this.player.chain('idle');

        this.trolls.children.iterate(troll => {
            if (troll && troll.active) {
                let currentVelX = troll.body.velocity.x;
                troll.setVelocityX(250); // Odepchnięcie w prawo
                
                this.time.delayedCall(600, () => {
                    if (troll && troll.active) troll.setVelocityX(currentVelX);
                });
            }
        });

        this.time.delayedCall(2000, () => {
            this.powerCooldown = false;
        });
    }

    // NAPRAWIONO: Usunięto wadliwy kod crashujący konsolę (zmieniono na czystą logikę niszczenia)
    powerHit(projectile, troll) {
        projectile.destroy();
        
        troll.hp--;
        troll.setTint(0xff5555);
        this.time.delayedCall(100, () => { if (troll.active) troll.clearTint(); });

        if (troll.hp <= 0) {
            troll.destroy();
            this.trollsLeft--;
            this.uiText.setText(`${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`);
            
            if (this.trollsLeft <= 0) {
                this.checkVictory();
            }
        }
    }

    playerHit() {
        if (this.spawnTimer) this.spawnTimer.destroy();
        if (music2 && music2.isPlaying) music2.stop();
        this.scene.start("GameOverScene");
    }

    checkVictory() {
        if (this.spawnTimer) this.spawnTimer.destroy();
        
        if (this.levelIndex < LEVELS.length - 1) {
            this.scene.start("GameScene", { levelIndex: this.levelIndex + 1 });
        } else {
            this.scene.start("WinScene");
        }
    }

    update() {
        if (!this.player || !this.player.body) return;
        this.player.setVelocity(0);

        // Ruch klawiatury
        if (this.cursors.left.isDown) { 
            this.player.setVelocityX(-320); 
            this.player.setFlipX(true);
        } else if (this.cursors.right.isDown) { 
            this.player.setVelocityX(320); 
            this.player.setFlipX(false);
        }
        
        if (this.cursors.up.isDown) this.player.setVelocityY(-320);
        else if (this.cursors.down.isDown) this.player.setVelocityY(320);

        // Klawisze skrótów K i L
        if (Phaser.Input.Keyboard.JustDown(this.keys.shoot)) {
            this.shootStraight();
        }
        if (this.keys.power.isDown && !this.powerCooldown) {
            this.usePower();
        }

        // Zmiany animacji stanu
        let currentAnim = this.player.anims.currentAnim ? this.player.anims.currentAnim.key : '';
        if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
            if (currentAnim !== 'run' && currentAnim !== 'atk' && currentAnim !== 'hero-power') {
                this.player.play('run', true);
            }
        } else {
            if (currentAnim !== 'idle' && currentAnim !== 'atk' && currentAnim !== 'hero-power') {
                this.player.play('idle', true);
            }
        }

        // Animacja trolli
        this.trolls.children.iterate(troll => {
            if (troll && troll.active) {
                troll.scaleY = 0.85 + Math.sin(this.time.now / 80) * 0.12;
                troll.scaleX = 1.0 + Math.sin(this.time.now / 100) * 0.05;

                if (troll.type.startsWith('tm')) {
                    troll.y += Math.sin(this.time.now / 70) * 2.5;
                }

                if (troll.x < -60) this.playerHit();
            }
        });
    }
}

// 4. Ekran Końca Gry - NAPRAWIONO: Pełny powrót do Menu Głównego
class GameOverScene extends Phaser.Scene { 
    constructor() { super("GameOverScene"); } 
    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.85);
        this.add.text(640, 300, "KONIEC GRY\nTwoja twarz została skradziona!", { 
            align: 'center', fontSize: '42px', fill: '#ff5555', fontStyle: 'bold', fontFamily: 'Arial' 
        }).setOrigin(0.5);
        
        let btn = this.add.rectangle(640, 460, 320, 60, 0xffffff).setInteractive({ useHandCursor: true });
        this.add.text(640, 460, "MENU GŁÓWNE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        
        btn.on('pointerdown', () => {
            this.scene.start("StartScene");
        });
    }
}

// 5. Ekran Gratulacji
class WinScene extends Phaser.Scene { 
    constructor() { super("WinScene"); } 
    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.9);
        
        this.add.text(640, 180, "🎉 GRATULACJE! 🎉", { 
            fontSize: '64px', fill: '#55ff55', fontStyle: 'bold', fontFamily: 'Arial' 
        }).setOrigin(0.5);
        
        this.add.text(640, 280, "Udało Ci się przejść wszystkie 3 poziomy!", { 
            align: 'center', fontSize: '28px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' 
        }).setOrigin(0.5);
        
        let btnRepeat = this.add.rectangle(640, 440, 320, 70, 0x55ff55).setInteractive({ useHandCursor: true });
        this.add.text(640, 440, "ZAGRAJ PONOWNIE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        btnRepeat.on('pointerdown', () => {
            this.scene.start("GameScene", { levelIndex: 0 });
        });
        
        let btnMenu = this.add.rectangle(640, 540, 320, 70, 0xffffff).setInteractive({ useHandCursor: true });
        this.add.text(640, 540, "MENU GŁÓWNE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
        btnMenu.on('pointerdown', () => {
            this.scene.start("StartScene");
        });
    }
}

const config = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 1280, height: 720 },
    input: { activePointers: 3 },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
    scene: [BootScene, StartScene, GameScene, GameOverScene, WinScene]
};

const game = new Phaser.Game(config);

</script>
</body>
</html>
