<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP vs Horda Troli - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

let globalVolume = 0.3;

const CONFIG = {
    type: Phaser.AUTO,
    scale: { 
        mode: Phaser.Scale.FIT, 
        autoCenter: Phaser.Scale.CENTER_BOTH, 
        width: 1280, 
        height: 720,
        fullscreenTarget: document.body
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: null
};

function playMusic(scene, key) {
    scene.sound.stopAll();
    if (scene.cache.audio.exists(key)) scene.sound.play(key, { loop: true, volume: globalVolume });
}

/* --- BOOT --- */
class BootScene extends Phaser.Scene {
    constructor() { super("BootScene"); }
    preload() {
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tabelarekordow', 'assets/tabelarekordow.png');
        this.load.image('bohater1', 'assets/bohater1.png');
        this.load.image('bohater2', 'assets/bohater2.png');
        this.load.image('hpower2', 'assets/hpower2.png');
        this.load.image('opower1', 'assets/opower1.png');
        ['tlolv1', 'tlolv2', 'tlolv3'].forEach(bg => this.load.image(bg, `assets/${bg}.jpeg`));
        for(let i=1; i<=3; i++) this.load.image('tb'+i, `assets/tb${i}.png`);
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
        this.load.audio('track3', 'assets/muzyka3.mp3');
    }
    create() { this.scene.start("StartScene"); }
}

/* --- MENU --- */
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }
    create() {
        playMusic(this, 'track1');
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);
        
        let btn = this.add.rectangle(640, 500, 300, 80, 0x000000, 0.8).setInteractive().setStrokeStyle(4, 0xffffff);
        this.add.text(640, 500, "START", { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
        btn.on('pointerdown', () => this.scene.start("SelectScene"));

        // Przycisk FullScreen
        let fsBtn = this.add.text(1250, 30, "⛶", { fontSize: '40px', fill: '#fff' }).setOrigin(1, 0).setInteractive();
        fsBtn.on('pointerdown', () => { if (!this.scale.isFullscreen) this.scale.startFullscreen(); });
    }
}

/* --- SELEKCJA --- */
class SelectScene extends Phaser.Scene {
    constructor() { super("SelectScene"); }
    create() {
        this.add.text(640, 100, "WYBIERZ WOJOWNIKA", { fontSize: '40px' }).setOrigin(0.5);
        let p1 = this.add.image(440, 360, 'bohater1').setInteractive().setScale(0.7);
        let p2 = this.add.image(840, 360, 'bohater2').setInteractive().setScale(0.7);
        p1.on('pointerdown', () => this.scene.start("GameScene", { hero: 'bohater1', name: 'Rysiek' }));
        p2.on('pointerdown', () => this.scene.start("GameScene", { hero: 'bohater2', name: 'Sławek' }));
    }
}

/* --- GRA --- */
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }
    init(data) {
        this.heroData = data;
        this.score = 0;
        this.level = 1;
        this.killedInLevel = 0;
        this.trollsToKill = 10;
        this.isTransitioning = false;
    }

    create() {
        playMusic(this, 'track2');
        this.bg = this.add.image(640, 360, 'tlolv1').setDisplaySize(1280, 720);
        
        this.player = this.physics.add.sprite(200, 360, this.heroData.hero).setScale(0.32);
        this.player.setCollideWorldBounds(true).setSize(200, 300);

        this.trolls = this.physics.add.group();
        this.bullets = this.physics.add.group();
        
        // Timer spawnu
        this.spawnTimer = this.time.addEvent({ delay: 1500, callback: this.spawn, callbackScope: this, loop: true });

        // Sterowanie: WASD + Strzałki
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        this.keyA = this.input.keyboard.addKey('A');
        this.keyZ = this.input.keyboard.addKey('Z');

        // UI
        this.uiTxt = this.add.text(20, 20, '', { fontSize: '28px', fill: '#fff', stroke: '#000', strokeThickness: 5 });
        
        // Kolizje
        this.physics.add.overlap(this.bullets, this.trolls, (b, t) => {
            b.destroy(); t.destroy(); this.score++; this.killedInLevel++;
        });
        this.physics.add.overlap(this.player, this.trolls, () => this.gameOver());

        // Przyciski mobilne (A i Z)
        this.createMobileControls();
    }

    createMobileControls() {
        let aBtn = this.add.circle(1150, 600, 60, 0xff0000, 0.6).setInteractive();
        this.add.text(1150, 600, "MOC", {fontSize:'24px'}).setOrigin(0.5);
        aBtn.on('pointerdown', () => this.fire());

        let zBtn = this.add.circle(1000, 600, 60, 0x00ffff, 0.6).setInteractive();
        this.add.text(1000, 600, "FALA", {fontSize:'24px'}).setOrigin(0.5);
        zBtn.on('pointerdown', () => this.nova());
    }

    spawn() {
        if (this.isTransitioning) return;
        let t = this.trolls.create(1350, Phaser.Math.Between(100, 620), 'tb'+Phaser.Math.Between(1,3));
        t.setScale(0.28).setFlipX(true).body.setVelocityX(-(220 + (this.level * 30)));
    }

    fire() {
        let b = this.bullets.create(this.player.x+50, this.player.y, 'hpower2').setScale(0.2);
        b.body.setVelocityX(900);
    }

    nova() {
        let n = this.add.image(this.player.x, this.player.y, 'opower1').setScale(0.1);
        this.tweens.add({ targets: n, scale: 5, alpha: 0, duration: 400, onComplete: () => n.destroy() });
        this.trolls.children.iterate(t => {
            if (t && t.active && Phaser.Math.Distance.Between(this.player.x, this.player.y, t.x, t.y) < 300) {
                t.destroy(); this.score++; this.killedInLevel++;
            }
        });
    }

    nextLevel() {
        this.isTransitioning = true;
        this.trolls.clear(true, true);
        
        if (this.level >= 3) {
            this.gameOver("WYGRAŁEŚ! KRAINA URATOWANA!");
            return;
        }

        this.level++;
        this.killedInLevel = 0;
        this.trollsToKill += 5;

        let txt = this.add.text(640, 360, `POZIOM ${this.level}`, { fontSize: '80px', fill: '#ff0', stroke: '#000', strokeThickness: 10 }).setOrigin(0.5);
        
        this.time.delayedCall(2500, () => {
            txt.destroy();
            this.bg.setTexture('tlolv' + this.level);
            this.isTransitioning = false;
        });
    }

    update() {
        this.uiTxt.setText(`POZIOM: ${this.level} | POKONANE: ${this.killedInLevel}/${this.trollsToKill} | WYNIK: ${this.score}`);
        
        // Sprawdzenie zwycięstwa
        if (this.killedInLevel >= this.trollsToKill && !this.isTransitioning) {
            this.nextLevel();
        }

        // RUCH (Prędkość 650!)
        let speed = 650;
        this.player.setVelocity(0);

        if (this.cursors.left.isDown || this.wasd.A.isDown) this.player.setVelocityX(-speed);
        else if (this.cursors.right.isDown || this.wasd.D.isDown) this.player.setVelocityX(speed);

        if (this.cursors.up.isDown || this.wasd.W.isDown) this.player.setVelocityY(-speed);
        else if (this.cursors.down.isDown || this.wasd.S.isDown) this.player.setVelocityY(speed);

        // Myszka/Dotyk (ruch do punktu)
        if (this.input.activePointer.isDown && this.input.activePointer.x < 900) {
            this.physics.moveTo(this.player, this.input.activePointer.x, this.input.activePointer.y, speed);
        }

        // Atak klawiatura
        if (Phaser.Input.Keyboard.JustDown(this.keyA)) this.fire();
        if (Phaser.Input.Keyboard.JustDown(this.keyZ)) this.nova();
    }

    gameOver(msg = "KONIEC GRY!") {
        let nick = prompt(msg + "\nTwój wynik: " + this.score + "\nPodaj nick:");
        let rec = JSON.parse(localStorage.getItem('pmp_pro_v1') || '[]');
        rec.push({ n: nick || "Gracz", s: this.score });
        rec.sort((a,b) => b.s - a.s);
        localStorage.setItem('pmp_pro_v1', JSON.stringify(rec.slice(0,10)));
        this.scene.start("RankScene");
    }
}

/* --- RANKING --- */
class RankScene extends Phaser.Scene {
    constructor() { super("RankScene"); }
    create() {
        playMusic(this, 'track3');
        this.add.image(640, 360, 'tabelarekordow').setDisplaySize(1280, 720);
        let rec = JSON.parse(localStorage.getItem('pmp_pro_v1') || '[]');
        rec.forEach((r, i) => {
            this.add.text(400, 180+(i*45), `${i+1}. ${r.n}`, { fontSize: '26px', fill: '#fff' });
            this.add.text(800, 180+(i*45), `${r.s} PKT`, { fontSize: '26px', fill: '#0f0' });
        });
        let b = this.add.text(640, 660, "MENU GŁÓWNE", { fontSize: '30px', fill: '#ff0' }).setOrigin(0.5).setInteractive();
        b.on('pointerdown', () => this.scene.start("StartScene"));
    }
}

const game = new Phaser.Game(Object.assign(CONFIG, { scene: [BootScene, StartScene, SelectScene, GameScene, RankScene] }));
</script>
</body>
</html>
