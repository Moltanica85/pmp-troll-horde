<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PMP: Horda Troli - Wersja Ostateczna</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

// Globalne zmienne stanu gry
let globalVolume = 0.3;
let selectedHeroStyle = 'normal'; // 'normal' lub 'glow'

// Definicje poziomów na podstawie plików z repozytorium (.jpeg)
const LEVELS = [
    { name: "Level 1 — Ścieżka Białego Wejścia", horde: 20, types: ["tb1"], bg: "tlolv1" },
    { name: "Level 2 — Kamienna Przełęcz", horde: 35, types: ["tb1", "tb2"], bg: "tlolv2" },
    { name: "Level 3 — Mchowy Amfiteatr", horde: 50, types: ["tb1", "tb3"], bg: "tlolv3", boss: true }
];

// 1. Scena Ładowania (BootScene)
class BootScene extends Phaser.Scene {
    constructor() { super("BootScene"); }

    preload() {
        // Ekran startowy i tła poziomów
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tlolv1', 'assets/tlolv1.jpeg');
        this.load.image('tlolv2', 'assets/tlolv2.jpeg');
        this.load.image('tlolv3', 'assets/tlolv3.jpeg');
        
        // Ataki / Moce
        this.load.image('hpower2', 'assets/hpower2.png');
        this.load.image('opower1', 'assets/opower1.png');

        // Podgląd postaci na ekran wyboru (czysty, pojedynczy obrazek)
        this.load.image('hero_avatar', 'assets/bohater1.png');

        // Główny arkusz ruchów - automatyczne dzielenie siatki 5x5
        // Przyjmujemy bezpieczny podział na 5 kolumn i 5 wierszy (200x200 przy pliku 1000x1000)
        this.load.spritesheet('hero_sheet', 'assets/ruch.png', { frameWidth: 200, frameHeight: 200 });

        // Przeciwnicy (Trole z repozytorium)
        this.load.image('tb1', 'assets/tb1.png');
        this.load.image('tb2', 'assets/tb2.png');
        this.load.image('tb3', 'assets/tb3.png');

        // Pliki dźwiękowe mp3
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
    }

    create() {
        // Konfiguracja klatek animacji na bazie pliku ruch.png
        this.anims.create({ 
            key: 'run',  
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: 14 }), 
            frameRate: 15, 
            repeat: -1 
        });
        
        this.anims.create({ 
            key: 'idle', 
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 15, end: 19 }), 
            frameRate: 6, 
            repeat: -1 
        });

        this.anims.create({ 
            key: 'atk', 
            frames: this.anims.generateFrameNumbers('hero_sheet', { start: 20, end: 24 }), 
            frameRate: 12 
        });

        this.scene.start("StartScene");
    }
}

// 2. Menu Główne (StartScene)
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }

    create() {
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);

        // Interaktywny przycisk uruchomienia
        let btnArea = this.add.rectangle(640, 420, 320, 80, 0x000000, 0.8).setInteractive({ useHandCursor: true }).setStrokeStyle(4, 0xffffff);
        this.add.text(640, 420, "START", { fontSize: '42px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);

        btnArea.on('pointerdown', () => {
            try {
                if (!this.sound.get('track1')) {
                    this.sound.play('track1', { loop: true, volume: globalVolume });
                }
            } catch (e) { console.warn("Audio Context standard block"); }
            this.scene.start("SelectScene");
        });

        btnArea.on('pointerover', () => btnArea.setFillStyle(0x222222, 0.9));
        btnArea.on('pointerout', () => btnArea.setFillStyle(0x000000, 0.8));
    }
}

// 3. Poprawiony Ekran Wyboru Postaci (SelectScene)
class SelectScene extends Phaser.Scene {
    constructor() { super("SelectScene"); }

    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x0a0a0a);
        this.add.text(640, 120, "WYBIERZ BOHATERA", { fontSize: '46px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);

        // Karta RYSIEK - korzysta z pojedynczej tekstury 'hero_avatar'
        let rCard = this.add.container(440, 380);
        let rBg = this.add.rectangle(0, 0, 300, 400, 0x1c1c1c).setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0xffffff);
        let rSprite = this.add.image(0, -30, 'hero_avatar').setDisplaySize(220, 260);
        let rText = this.add.text(0, 140, "RYSIEK", { fontSize: '32px', fill: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
        rCard.add([rBg, rSprite, rText]);

        rBg.on('pointerdown', () => {
            selectedHeroStyle = 'normal';
            this.scene.start("GameScene", { levelIndex: 0 });
        });

        // Karta SŁAWEK - nałożony zielony filtr (Tint) odpowiadający wizji
        let sCard = this.add.container(840, 380);
        let sBg = this.add.rectangle(0, 0, 300, 400, 0x1c1c1c).setInteractive({ useHandCursor: true }).setStrokeStyle(2, 0x7bd97b);
        let sSprite = this.add.image(0, -30, 'hero_avatar').setDisplaySize(220, 260);
        sSprite.setTint(0x7bd97b);
        let sText = this.add.text(0, 140, "SŁAWEK", { fontSize: '32px', fill: '#7bd97b', fontStyle: 'bold' }).setOrigin(0.5);
        sCard.add([sBg, sSprite, sText]);

        sBg.on('pointerdown', () => {
            selectedHeroStyle = 'glow';
            this.scene.start("GameScene", { levelIndex: 0 });
        });

        // Animacje najechania na karty menu
        rBg.on('pointerover', () => rCard.setScale(1.05));
        rBg.on('pointerout', () => rCard.setScale(1.0));
        sBg.on('pointerover', () => sCard.setScale(1.05));
        sBg.on('pointerout', () => sCard.setScale(1.0));
    }
}

// 4. Scena Rozgrywki (GameScene)
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }

    init(data) {
        this.levelIndex = data.levelIndex || 0;
        this.levelData = LEVELS[this.levelIndex];
    }

    create() {
        if (this.sound.get('track1')) this.sound.stop('track1');
        try {
            if (!this.sound.get('track2')) this.sound.play('track2', { loop: true, volume: globalVolume });
        } catch (e) {}

        // Renderowanie tła poziomu
        this.add.image(640, 360, this.levelData.bg).setDisplaySize(1280, 720);

        // Inicjalizacja gracza z poprawnie pociętym arkuszem animacji
        this.player = this.physics.add.sprite(200, 450, 'hero_sheet');
        this.player.setCollideWorldBounds(true);
        this.player.setScale(0.9);
        this.player.body.setSize(90, 150);

        // Stylizacja koloru bohatera na podstawie wyboru
        if (selectedHeroStyle === 'glow') {
            this.player.setTint(0x7bd97b);
        }

        this.player.play('idle');

        // Grupy kolizyjne silnika Arcade
        this.trolls = this.physics.add.group();
        this.powers = this.physics.add.group();

        // Liczniki i UI
        this.trollsLeft = this.levelData.horde;
        this.trollsSpawned = 0;
        this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { 
            fontSize: '26px', 
            fill: '#fff',
            stroke: '#000',
            strokeThickness: 5
        });

        // Wyrzutnik przeciwników ze stałym interwałem
        this.spawnTimer = this.time.addEvent({ delay: 1400, callback: this.spawnTroll, callbackScope: this, loop: true });

        // Nadzorca kolizji
        this.physics.add.overlap(this.player, this.trolls, this.playerHit, null, this);
        this.physics.add.overlap(this.powers, this.trolls, this.powerHit, null, this);

        // Kliknięcie/Dotyk = Wystrzelenie fali defensywnej
        this.input.on('pointerdown', (p) => this.firePower(p.x, p.y));
        this.cursors = this.input.keyboard.createCursorKeys();
    }

    spawnTroll() {
        if (this.trollsSpawned >= this.levelData.horde) return;
        
        let type = Phaser.Utils.Array.GetRandom(this.levelData.types);
        let troll = this.trolls.create(1350, Phaser.Math.Between(220, 640), type);
        troll.setDisplaySize(90, 90);
        
        // Przypisanie unikalnego zachowania fizycznego dla typów trolli
        troll.type = type;
        if (type === 'tb1') troll.setVelocityX(-170); // Bagienny
        if (type === 'tb2') troll.setVelocityX(-100); // Kamienny
        if (type === 'tb3') troll.setVelocityX(-230); // Mchowy

        this.trollsSpawned++;
    }

    firePower(targetX, targetY) {
        this.player.play('atk');
        this.player.chain('idle');

        // Wybór koloru pocisku pod postać
        let currentPowerImg = selectedHeroStyle === 'normal' ? 'hpower2' : 'opower1';
        let projectile = this.powers.create(this.player.x + 40, this.player.y, currentPowerImg);
        projectile.setDisplaySize(60, 60);
        
        this.physics.moveTo(projectile, targetX, targetY, 550);
    }

    powerHit(projectile, troll) {
        projectile.destroy();
        
        // Efekt odrzutu za pomocą systemu Tween
        this.tweens.add({
            targets: troll,
            x: troll.x + 120,
            duration: 150,
            onComplete: () => {
                troll.destroy();
                this.trollsLeft--;
                this.uiText.setText(`${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`);
                
                if (this.trollsLeft <= 0) {
                    this.checkVictory();
                }
            }
        });
    }

    playerHit() {
        this.spawnTimer.destroy();
        this.scene.start("GameOverScene", { levelIndex: this.levelIndex });
    }

    checkVictory() {
        this.spawnTimer.destroy();
        if (this.levelIndex < LEVELS.length - 1) {
            this.scene.start("GameScene", { levelIndex: this.levelIndex + 1 });
        } else {
            this.scene.start("WinScene");
        }
    }

    update() {
        this.player.setVelocity(0);

        // Obsługa fizyki ruchu poziomego i pionowego
        if (this.cursors.left.isDown) { 
            this.player.setVelocityX(-320); 
            this.player.setFlipX(true); 
        } else if (this.cursors.right.isDown) { 
            this.player.setVelocityX(-320); 
            this.player.setFlipX(false); 
        }
        
        if (this.cursors.up.isDown) this.player.setVelocityY(-320);
        else if (this.cursors.down.isDown) this.player.setVelocityY(320);

        // Inteligentny dobór odtwarzanej animacji
        if (this.player.body.velocity.x !== 0 || this.player.body.velocity.y !== 0) {
            if (this.player.anims.currentAnim.key !== 'run' && this.player.anims.currentAnim.key !== 'atk') this.player.play('run');
        } else {
            if (this.player.anims.currentAnim.key !== 'idle' && this.player.anims.currentAnim.key !== 'atk') this.player.play('idle');
        }

        // Pętla aktualizująca specyficzny ruch mchowych trolli
        this.trolls.children.iterate(troll => {
            if (troll && troll.active) {
                if (troll.type === 'tb3') {
                    troll.y += Math.sin(this.time.now / 80) * 4;
                }
                if (troll.x < -60) {
                    this.playerHit();
                }
            }
        });
    }
}

// 5. Sceny Końcowe
class GameOverScene extends Phaser.Scene { 
    constructor() { super("GameOverScene"); } 
    create(data) {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.85);
        this.add.text(640, 300, "PRZERÓBKA NIEUDANA", { fontSize: '50px', fill: '#ff5555', fontStyle: 'bold' }).setOrigin(0.5);
        
        let btn = this.add.rectangle(640, 440, 280, 60, 0xffffff).setInteractive({ useHandCursor: true });
        this.add.text(640, 440, "PONÓW POZIOM", { fontSize: '24px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5);
        
        btn.on('pointerdown', () => this.scene.start("GameScene", { levelIndex: data.levelIndex }));
    }
}

class WinScene extends Phaser.Scene { 
    constructor() { super("WinScene"); } 
    create() {
        this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.9);
        this.add.text(640, 300, "ZWYCIĘSTWO!", { fontSize: '60px', fill: '#55ff55', fontStyle: 'bold' }).setOrigin(0.5);
        
        let btn = this.add.rectangle(640, 440, 280, 60, 0xffffff).setInteractive({ useHandCursor: true });
        this.add.text(640, 440, "POWRÓT", { fontSize: '24px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5);
        
        btn.on('pointerdown', () => this.scene.start("StartScene"));
    }
}

// 6. Konfiguracja główna systemu Phaser
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 1280,
        height: 720
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 0 }, debug: false }
    },
    scene: [BootScene, StartScene, SelectScene, GameScene, GameOverScene, WinScene]
};
const game = new Phaser.Game(config);

</script>
</body>
</html>
