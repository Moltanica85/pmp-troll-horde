<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PMP: Horda Troli - Edycja Animowana</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

const CONFIG = {
    type: Phaser.AUTO,
    scale: { 
        mode: Phaser.Scale.FIT, 
        autoCenter: Phaser.Scale.CENTER_BOTH, 
        width: 1280, 
        height: 720,
        fullscreenTarget: document.body
    },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: null
};

/* --- SCENA ŁADOWANIA --- */
class BootScene extends Phaser.Scene {
    constructor() { super("BootScene"); }
    preload() {
        // Tła i UI
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tabelarekordow', 'assets/tabelarekordow.png');
        ['tlolv1', 'tlolv2', 'tlolv3'].forEach(bg => this.load.image(bg, `assets/${bg}.jpeg`));
        
        // Pociski
        this.load.image('hpower2', 'assets/hpower2.png'); // Kula ognia
        this.load.image('opower1', 'assets/opower1.png'); // Efekt fali

        // ŁADOWANIE TWOICH PANELI (Sprite Sheets)
        // Zakładamy klatkę ok. 512x768 (standard dla Twoich grafik 4x4)
        const frameConfig = { frameWidth: 512, frameHeight: 768 };
        this.load.spritesheet('p_main', 'assets/bohater1panel1.png', frameConfig);
        this.load.spritesheet('p_action', 'assets/bohater1panel2.png', frameConfig);
        this.load.spritesheet('p_damage', 'assets/bohater1panel4.png', frameConfig);
        this.load.spritesheet('p_run', 'assets/bohater1panel5.png', frameConfig);

        // Trolle (pozostają jako static obrazy lub dodaj ich panele tutaj)
        for(let i=1; i<=3; i++) {
            this.load.image('tb'+i, `assets/tb${i}.png`);
            this.load.image('tk'+i, `assets/tk${i}.png`);
            this.load.image('tm'+i, `assets/tm${i}.png`);
        }

        // Muzyka
        this.load.audio('track1', 'assets/muzyka1.mp3');
        this.load.audio('track2', 'assets/muzyka2.mp3');
    }

    create() {
        // DEFINICJA ANIMACJI RYŚKA
        // Chód (Panel 1, Rząd 1)
        this.anims.create({
            key: 'walk',
            frames: this.anims.generateFrameNumbers('p_main', { start: 0, end: 3 }),
            frameRate: 8, repeat: -1
        });

        // Bieg (Panel 5, Rząd 1)
        this.anims.create({
            key: 'run',
            frames: this.anims.generateFrameNumbers('p_run', { start: 0, end: 3 }),
            frameRate: 12, repeat: -1
        });

        // Atak K - Kula ognia (Panel 1, Rząd 3)
        this.anims.create({
            key: 'attack_k',
            frames: this.anims.generateFrameNumbers('p_main', { start: 8, end: 11 }),
            frameRate: 15, repeat: 0
        });

        // Atak L - Fala energii (Panel 2, Rząd 1-2)
        this.anims.create({
            key: 'attack_l',
            frames: this.anims.generateFrameNumbers('p_action', { start: 0, end: 7 }),
            frameRate: 12, repeat: 0
        });

        // Śmierć (Panel 4, Rząd 3-4)
        this.anims.create({
            key: 'death',
            frames: this.anims.generateFrameNumbers('p_damage', { start: 8, end: 15 }),
            frameRate: 10, repeat: 0
        });

        this.scene.start("StartScene");
    }
}

/* --- MENU GŁÓWNE --- */
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }
    create() {
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);
        let btn = this.add.rectangle(640, 550, 240, 70, 0x000000, 0.7).setInteractive().setStrokeStyle(3, 0xffffff);
        this.add.text(640, 550, "START", { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
        btn.on('pointerdown', () => this.scene.start("GameScene"));

        // Przycisk FullScreen
        this.add.text(1250, 30, "⛶", { fontSize: '40px', fill: '#fff' }).setOrigin(1, 0).setInteractive()
            .on('pointerdown', () => { if (!this.scale.isFullscreen) this.scale.startFullscreen(); });
    }
}

/* --- GŁÓWNA ROZGRYWKA --- */
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }
    init() {
        this.score = 0;
        this.level = 1;
        this.killedInLevel = 0;
        this.isDead = false;
        this.isAttacking = false;
        this.levelConfig = {
            1: { goal: 25, speed: 220, type: 'tb' },
            2: { goal: 65, speed: 310, type: 'tk' },
            3: { goal: 100, speed: 420, type: 'tm' }
        };
    }

    create() {
        this.bg = this.add.image(640, 360, 'tlolv1').setDisplaySize(1280, 720);
        
        // Tworzenie Gracza z pierwszej klatki
        this.player = this.physics.add.sprite(200, 360, 'p_main', 0).setScale(0.35);
        this.player.setCollideWorldBounds(true).setSize(300, 500);

        this.trolls = this.physics.add.group();
        this.bullets = this.physics.add.group();

        // Klawisze
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys('W,A,S,D');
        this.keyK = this.input.keyboard.addKey('K');
        this.keyL = this.input.keyboard.addKey('L');

        // Spawning
        this.time.addEvent({ delay: 1300, callback: this.spawnTroll, callbackScope: this, loop: true });

        // UI
        this.uiTxt = this.add.text(25, 25, '', { fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 4 });

        // Kolizje
        this.physics.add.overlap(this.bullets, this.trolls, (b, t) => {
            b.destroy(); t.destroy(); this.score++; this.killedInLevel++;
        });
        this.physics.add.overlap(this.player, this.trolls, () => this.handleGameOver());
    }

    spawnTroll() {
        if (this.isDead) return;
        let conf = this.levelConfig[this.level];
        let t = this.trolls.create(1350, Phaser.Math.Between(120, 600), conf.type + Phaser.Math.Between(1,3));
        t.setScale(0.3).setFlipX(true).body.setVelocityX(-conf.speed);
        
        // Animacja bujania trolla
        this.tweens.add({ targets: t, y: t.y - 20, angle: {from: -5, to: 5}, duration: 300, yoyo: true, repeat: -1 });
    }

    handleAttackK() {
        if (this.isAttacking) return;
        this.isAttacking = true;
        this.player.play('attack_k');
        
        this.time.delayedCall(200, () => {
            let b = this.bullets.create(this.player.x + 60, this.player.y, 'hpower2').setScale(0.2);
            b.body.setVelocityX(1100);
        });

        this.player.on('animationcomplete', () => { this.isAttacking = false; });
    }

    handleAttackL() {
        if (this.isAttacking) return;
        this.isAttacking = true;
        this.player.play('attack_l');

        let nova = this.add.image(this.player.x, this.player.y, 'opower1').setScale(0.2).setAlpha(0.8);
        this.tweens.add({
            targets: nova, scale: 6, alpha: 0, duration: 500, 
            onUpdate: () => {
                this.trolls.children.iterate(t => {
                    if (t && Phaser.Math.Distance.Between(this.player.x, this.player.y, t.x, t.y) < 250) {
                        t.destroy(); this.score++; this.killedInLevel++;
                    }
                });
            },
            onComplete: () => nova.destroy()
        });

        this.time.delayedCall(600, () => { this.isAttacking = false; });
    }

    update() {
        if (this.isDead) return;

        let conf = this.levelConfig[this.level];
        this.uiTxt.setText(`POZIOM: ${this.level} | TROLLE: ${this.killedInLevel}/${conf.goal} | WYNIK: ${this.score}`);

        if (this.killedInLevel >= conf.goal) this.nextLevel();

        // RUCH I ANIMACJA
        let speed = 650;
        let moving = false;
        this.player.setVelocity(0);

        if (this.cursors.left.isDown || this.wasd.A.isDown) { this.player.setVelocityX(-speed); moving = true; }
        else if (this.cursors.right.isDown || this.wasd.D.isDown) { this.player.setVelocityX(speed); moving = true; }

        if (this.cursors.up.isDown || this.wasd.W.isDown) { this.player.setVelocityY(-speed); moving = true; }
        else if (this.cursors.down.isDown || this.wasd.S.isDown) { this.player.setVelocityY(speed); moving = true; }

        // Zarządzanie animacją ruchu
        if (!this.isAttacking) {
            if (moving) {
                this.player.play('run', true);
            } else {
                this.player.stop();
                this.player.setFrame(0); // Klatka "IDLE"
            }
        }

        // Ataki
        if (Phaser.Input.Keyboard.JustDown(this.keyK)) this.handleAttackK();
        if (Phaser.Input.Keyboard.JustDown(this.keyL)) this.handleAttackL();
    }

    nextLevel() {
        if (this.level >= 3) {
            alert("GRATULACJE! URATOWAŁEŚ KRAINĘ!");
            this.scene.start("StartScene");
            return;
        }
        this.level++;
        this.killedInLevel = 0;
        this.bg.setTexture('tlolv' + this.level);
    }

    handleGameOver() {
        if (this.isDead) return;
        this.isDead = true;
        this.player.setVelocity(0);
        this.player.play('death');
        
        this.time.delayedCall(1500, () => {
            let n = prompt("KONIEC GRY! Twój wynik: " + this.score + "\nPodaj nick:");
            this.scene.start("StartScene");
        });
    }
}

const game = new Phaser.Game(Object.assign(CONFIG, { scene: [BootScene, StartScene, GameScene] }));
</script>
</body>
</html>
