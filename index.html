<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przerób Mnie Panie: Troll Horde</title>
    <!-- Ładowanie biblioteki Phaser z zaufanego źródła CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<script>
/* =========================================================== 
   KONFIGURACJA I LOGIKA GRY (Zintegrowana)
   =========================================================== */

const CONFIG = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: { 
        default: 'arcade', 
        arcade: { gravity: { y: 0 }, debug: false } 
    },
    scene: null 
};

const LEVELS = [
    { name: "Ścieżka Białego Wejścia", horde: 15, types: ["bagienny"], bg: 'tlolv1' },
    { name: "Kamienna Przełęcz", horde: 25, types: ["bagienny", "kamienny"], bg: 'tlolv2' },
    { name: "Mchowy Amfiteatr", horde: 40, types: ["bagienny", "mchowy"], bg: 'tlolv3' }
];

// --- SCENA MENU ---
class MenuScene extends Phaser.Scene {
    constructor() { super("MenuScene"); }
    preload() {
        // Ścieżki do plików graficznych w Twoim folderze assets[cite: 1]
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('bohater1', 'assets/bohater1.png');
        this.load.image('bohater2', 'assets/bohater2.png');
    }
    create() {
        this.add.image(this.scale.width / 2, this.scale.height / 2, 'oknoglowne').setDisplaySize(this.scale.width, this.scale.height);
        this.add.text(this.scale.width / 2, 80, "PRZERÓB MNIE PANIE", { fontSize: '48px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        
        // Wybór postaci[cite: 1]
        let p1 = this.add.image(this.scale.width * 0.35, this.scale.height * 0.6, 'bohater1').setInteractive().setScale(0.5);
        let p2 = this.add.image(this.scale.width * 0.65, this.scale.height * 0.6, 'bohater2').setInteractive().setScale(0.5);

        p1.on('pointerdown', () => this.scene.start("GameScene", { playerKey: 'bohater1', levelIndex: 0 }));
        p2.on('pointerdown', () => this.scene.start("GameScene", { playerKey: 'bohater2', levelIndex: 0 }));
    }
}

// --- SCENA GRY ---
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }

    init(data) {
        this.levelIndex = data.levelIndex || 0;
        this.playerKey = data.playerKey || 'bohater1';
    }

    preload() {
        // Kompletny zestaw grafik z Twojego repozytorium
        this.load.image('tlolv1', 'assets/tlolv1.jpeg');
        this.load.image('tlolv2', 'assets/tlolv2.jpeg');
        this.load.image('tlolv3', 'assets/tlolv3.jpeg');
        this.load.image('wTitle', 'assets/wTitle.png');
        this.load.image('hpower2', 'assets/hpower2.jpeg');
        this.load.image('opower1', 'assets/opower1.jpeg');

        // Trolle - ładowanie wszystkich wariantów[cite: 1]
        for(let i=1; i<=3; i++) {
            this.load.image(`tb${i}`, `assets/tb${i}.png`);
            this.load.image(`tk${i}`, `assets/tk${i}.jpeg`);
            this.load.image(`tm${i}`, `assets/tm${i}.png`);
        }
    }

    create() {
        const lvl = LEVELS[this.levelIndex];
        this.add.image(this.scale.width / 2, this.scale.height / 2, lvl.bg).setDisplaySize(this.scale.width, this.scale.height);

        this.player = this.physics.add.sprite(200, this.scale.height / 2, this.playerKey);
        this.player.setScale(0.5).setCollideWorldBounds(true);
        this.player.cooldowns = { flash: 0, impulse: 0 };

        this.trolls = this.physics.add.group();
        this.spawnTimer = this.time.addEvent({ 
            delay: 1500, 
            callback: () => this.spawnTroll(lvl.types), 
            repeat: lvl.horde - 1 
        });

        this.input.on('pointerdown', (p) => {
            if (p.x < this.scale.width / 2) this.useFlash();
            else this.useImpulse();
        });

        this.physics.add.overlap(this.player, this.trolls, this.handleGameOver, null, this);
    }

    spawnTroll(types) {
        const type = Phaser.Utils.Array.GetRandom(types);
        const variant = Phaser.Math.Between(1, 3);
        let key = (type === 'bagienny') ? `tb${variant}` : (type === 'kamienny' ? `tk${variant}` : `tm${variant}`);

        let troll = this.trolls.create(this.scale.width + 100, Phaser.Math.Between(100, this.scale.height - 100), key);
        troll.setScale(0.4);
        troll.body.setVelocityX(type === 'kamienny' ? -60 : -130);
    }

    useFlash() {
        if (this.player.cooldowns.flash > Date.now()) return;
        this.player.cooldowns.flash = Date.now() + 3000;
        let fx = this.add.image(this.player.x, this.player.y, 'opower1').setScale(0.2).setAlpha(0.8);
        this.tweens.add({ targets: fx, scale: 2, alpha: 0, duration: 500, onComplete: () => fx.destroy() });
    }

    useImpulse() {
        if (this.player.cooldowns.impulse > Date.now()) return;
        this.player.cooldowns.impulse = Date.now() + 2000;
        let fx = this.add.image(this.player.x + 50, this.player.y, 'hpower2').setScale(0.5);
        this.tweens.add({ targets: fx, x: '+=300', alpha: 0, duration: 400, onComplete: () => fx.destroy() });
    }

    handleGameOver() {
        this.physics.pause();
        this.scene.start("GameOverScene", { levelIndex: this.levelIndex, playerKey: this.playerKey });
    }

    update() {
        this.trolls.children.iterate(t => {
            if (t && t.active && t.x < -100) this.handleGameOver();
        });
        if (this.spawnTimer && this.spawnTimer.getRepeatCount() === 0 && this.trolls.countActive() === 0) {
            if (this.levelIndex < LEVELS.length - 1) this.scene.start("TransitionScene", { levelIndex: this.levelIndex + 1, playerKey: this.playerKey });
            else this.scene.start("WinScene");
        }
    }
}

// --- SCENY POMOCNICZE ---
class TransitionScene extends Phaser.Scene {
    constructor() { super("TransitionScene"); }
    create(data) {
        this.add.image(this.scale.width / 2, this.scale.height / 2, 'wTitle').setDisplaySize(this.scale.width, this.scale.height);
        this.time.delayedCall(2000, () => this.scene.start("GameScene", data));
    }
}

class GameOverScene extends Phaser.Scene {
    constructor() { super("GameOverScene"); }
    create(data) {
        this.add.rectangle(0,0, this.scale.width, this.scale.height, 0x000000, 0.7).setOrigin(0);
        this.add.text(this.scale.width/2, this.scale.height/2, "KONIEC GRY", { fontSize: '40px', fill: '#f00' }).setOrigin(0.5);
        this.input.once('pointerdown', () => this.scene.start("GameScene", data));
    }
}

class WinScene extends Phaser.Scene {
    constructor() { super("WinScene"); }
    create() {
        this.add.text(this.scale.width/2, this.scale.height/2, "WYGRANA!", { fontSize: '40px', fill: '#0f0' }).setOrigin(0.5);
        this.input.once('pointerdown', () => this.scene.start("MenuScene"));
    }
}

// URUCHOMIENIE GRY
CONFIG.scene = [MenuScene, GameScene, TransitionScene, GameOverScene, WinScene];
new Phaser.Game(CONFIG);

</script>
</body>
</html>
