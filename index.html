<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>PMP vs Horda Troli</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>
<script>

// Globalne ustawienia głośności (0.3 = 3 w skali 0-10)
let globalVolume = 0.3;

const CONFIG = {
    type: Phaser.AUTO,
    scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 1280, height: 720 },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: null
};

/* --- BOOT: Ładowanie zasobów --- */
class BootScene extends Phaser.Scene {
    constructor() { super("BootScene"); }
    preload() {
        this.load.image('oknoglowne', 'assets/oknoglowne.png');
        this.load.image('tabelarekordow', 'assets/tabelarekordow.png');
        this.load.image('bohater1', 'assets/bohater1.png');
        this.load.image('bohater2', 'assets/bohater2.png');
        ['tlolv1', 'tlolv2', 'tlolv3'].forEach(bg => this.load.image(bg, `assets/${bg}.jpeg`));
        for(let i=1; i<=3; i++) {
            this.load.image('tb'+i, `assets/tb${i}.png`);
            this.load.image('tk'+i, `assets/tk${i}.png`);
            this.load.image('tm'+i, `assets/tm${i}.png`);
        }
        // AUDIO
        this.load.audio('track1', 'assets/pmp vs.horda troli1.mp3');
        this.load.audio('track2', 'assets/pmp vs.horda troli2.mp3');
        this.load.audio('track3', 'assets/pmp vs.horda troli3.mp3');
    }
    create() { this.scene.start("StartScene"); }
}

/* --- FUNKCJA ZMIANY MUZYKI --- */
function playMusic(scene, key) {
    scene.sound.stopAll();
    scene.sound.play(key, { loop: true, volume: globalVolume });
}

/* --- SCENA STARTOWA --- */
class StartScene extends Phaser.Scene {
    constructor() { super("StartScene"); }
    create() {
        playMusic(this, 'track1');
        this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);
        
        let btn = this.add.rectangle(640, 500, 300, 70, 0x000000, 0.8).setInteractive().setStrokeStyle(3, 0xffffff);
        this.add.text(640, 500, "DO BOJU!", { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);
        btn.on('pointerdown', () => this.scene.start("SelectScene"));
        
        this.createVolumeUI();
    }

    createVolumeUI() {
        this.add.text(100, 650, "GŁOŚNOŚĆ:", { fontSize: '20px' });
        let bar = this.add.rectangle(300, 660, 200, 10, 0x444444);
        let handle = this.add.circle(200 + (globalVolume * 10 * 20), 660, 15, 0xffffff).setInteractive({ draggable: true });
        let volText = this.add.text(420, 650, Math.round(globalVolume * 10), { fontSize: '20px' });

        handle.on('drag', (p, dragX) => {
            let x = Phaser.Math.Clamp(dragX, 200, 400);
            handle.x = x;
            globalVolume = (x - 200) / 200;
            this.sound.setVolume(globalVolume);
            volText.setText(Math.round(globalVolume * 10));
        });
    }
}

/* --- WYBÓR POSTACI --- */
class SelectScene extends Phaser.Scene {
    constructor() { super("SelectScene"); }
    create() {
        // Kontynuacja track1 (nie restartujemy muzyki, bo to to samo okno klimatyczne)
        this.add.text(640, 100, "WYBIERZ WOJOWNIKA", { fontSize: '48px', fill: '#fff' }).setOrigin(0.5);
        
        let p1 = this.add.image(400, 360, 'bohater1').setInteractive().setScale(0.8);
        this.add.text(400, 500, "RYSIEK", { fontSize: '30px', fill: '#0f0' }).setOrigin(0.5);

        let p2 = this.add.image(880, 360, 'bohater2').setInteractive().setScale(0.8);
        this.add.text(880, 500, "SŁAWEK", { fontSize: '30px', fill: '#ff0' }).setOrigin(0.5);

        p1.on('pointerdown', () => this.scene.start("GameScene", { hero: 'bohater1', name: 'Rysiek' }));
        p2.on('pointerdown', () => this.scene.start("GameScene", { hero: 'bohater2', name: 'Sławek' }));
    }
}

/* --- GRA --- */
class GameScene extends Phaser.Scene {
    constructor() { super("GameScene"); }
    init(data) { this.heroData = data; this.score = 0; }
    create() {
        playMusic(this, 'track2');
        this.add.image(640, 360, 'tlolv1').setDisplaySize(1280, 720);
        
        this.player = this.physics.add.sprite(200, 360, this.heroData.hero).setScale(0.45).setCollideWorldBounds(true);
        this.trolls = this.physics.add.group();
        
        this.time.addEvent({ delay: 1500, callback: this.spawn, callbackScope: this, loop: true });
        this.physics.add.overlap(this.player, this.trolls, () => this.endGame());
        
        this.scoreText = this.add.text(20, 20, `Trolle: 0`, { fontSize: '28px', fill: '#fff' });
    }

    update() {
        if (this.input.activePointer.isDown) this.physics.moveToObject(this.player, this.input.activePointer, 400);
        else this.player.setVelocity(0);
    }

    spawn() {
        let t = this.trolls.create(1350, Phaser.Math.Between(100, 620), 'tb'+Phaser.Math.Between(1,3));
        t.setScale(0.4).body.setVelocityX(-250);
    }

    endGame() {
        let nick = prompt("Horda Cię dopadła! Podaj swój nick:", "Gracz");
        let records = JSON.parse(localStorage.getItem('troll_records') || '[]');
        records.push({ name: nick || "Anonim", score: this.score });
        records.sort((a, b) => b.score - a.score);
        localStorage.setItem('troll_records', JSON.stringify(records.slice(0, 10)));
        this.scene.start("RankScene");
    }
}

/* --- RANKING --- */
class RankScene extends Phaser.Scene {
    constructor() { super("RankScene"); }
    create() {
        playMusic(this, 'track3');
        this.add.image(640, 360, 'tabelarekordow').setDisplaySize(1280, 720);
        
        this.add.text(640, 60, "TOP 10 POGROMCÓW", { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);
        
        const records = JSON.parse(localStorage.getItem('troll_records') || '[]');
        records.forEach((r, i) => {
            let y = 160 + (i * 45);
            this.add.text(400, y, `${i+1}. ${r.name}`, { fontSize: '24px', fill: '#fff' });
            this.add.text(850, y, `${r.score} pkt`, { fontSize: '24px', fill: '#0f0' });
        });

        let btn = this.add.text(640, 660, "POWRÓT", { fontSize: '30px', fill: '#ff0' }).setOrigin(0.5).setInteractive();
        btn.on('pointerdown', () => this.scene.start("StartScene"));
    }
}

const game = new Phaser.Game(Object.assign(CONFIG, { scene: [BootScene, StartScene, SelectScene, GameScene, RankScene] }));
</script>
</body>
</html>
