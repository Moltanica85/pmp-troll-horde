<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>PMP: Horda Troli - Wersja Stabilna 2D</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no" />
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
<style>
  body { margin: 0; background: #000; overflow: hidden; padding: 0; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
  canvas { display: block; margin: 0 auto; }
  .hidden { display:none; }
</style>
</head>
<body>
<script>
// -------------------- Globalne --------------------
let globalVolume = 0.3;
let music1 = null;
let music2 = null;

const LEVELS = [
  { index: 1, name: "Level 1 — Ścieżka Białego Wejścia", horde: 20, bg: "tlolv1", types: ["tb1","tb2","tb3"] },
  { index: 2, name: "Level 2 — Kamienna Przełęcz", horde: 35, bg: "tlolv2", types: ["tk1","tk2","tk3"] },
  { index: 3, name: "Level 3 — Mchowy Amfiteatr", horde: 50, bg: "tlolv3", types: ["tm1","tm2","tm3"] }
];

// -------------------- BootScene --------------------
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }

  preload() {
    this.load.image('oknoglowne', 'assets/oknoglowne.png');
    this.load.image('tlolv1', 'assets/tlolv1.jpeg');
    this.load.image('tlolv2', 'assets/tlolv2.jpeg');
    this.load.image('tlolv3', 'assets/tlolv3.jpeg');
    this.load.image('hpower2', 'assets/hpower2.png');
    this.load.image('opower1', 'assets/opower1.png');

    if (this.textures.exists('hero_sheet')) this.textures.remove('hero_sheet');

    this.load.spritesheet('hero_sheet', 'assets/bh1run.png', { frameWidth: 120, frameHeight: 120, margin: 0, spacing: 0 });

    const trollFiles = ['tb1','tb2','tb3','tk1','tk2','tk3','tm1','tm2','tm3'];
    trollFiles.forEach(name => this.load.image(name, `assets/${name}.png`));

    this.load.audio('track1', 'assets/muzyka1.mp3');
    this.load.audio('track2', 'assets/muzyka2.mp3');

    this.load.on('filecomplete', (key) => console.log('Załadowany:', key));
    this.load.on('loaderror', (file) => console.error('Błąd ładowania:', file.key));
  }

  create() {
    this.anims.create({
      key: 'hero-run',
      frames: this.anims.generateFrameNumbers('hero_sheet', { start: 0, end: 24 }),
      frameRate: 14,
      repeat: -1
    });

    this.scene.start('StartScene');
  }
}

// -------------------- StartScene --------------------
class StartScene extends Phaser.Scene {
  constructor() { super('StartScene'); }
  create() {
    this.add.image(640, 360, 'oknoglowne').setDisplaySize(1280, 720);

    let btnArea = this.add.rectangle(640, 400, 320, 80, 0x000000, 0.8).setInteractive({ useHandCursor: true }).setStrokeStyle(4, 0xffffff);
    this.add.text(640, 400, "START GRY", { fontSize: '42px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);

    btnArea.on('pointerdown', () => {
      btnArea.disableInteractive();
      if (this.sound.context && this.sound.context.state === 'suspended') this.sound.context.resume();
      if (!music1) music1 = this.sound.add('track1', { loop: true, volume: globalVolume });
      try { if (!music1.isPlaying) music1.play(); } catch(e) {}
      this.scene.start('GameScene', { levelIndex: 0 });
    });

    this.add.text(640, 540, "GŁOŚNOŚĆ", { fontSize: '20px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    this.add.rectangle(640, 580, 200, 10, 0x333333);
    let handle = this.add.circle(540 + (globalVolume * 200), 580, 15, 0xffffff).setInteractive({ useHandCursor: true });
    this.input.setDraggable(handle);
    this.input.on('drag', (pointer, gameObject, dragX) => {
      dragX = Phaser.Math.Clamp(dragX, 540, 740);
      gameObject.x = dragX;
      globalVolume = (dragX - 540) / 200;
      this.sound.setVolume(globalVolume);
    });
  }
}

// -------------------- GameScene --------------------
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.levelIndex = (data && data.levelIndex !== undefined) ? data.levelIndex : 0;
    this.levelData = LEVELS[this.levelIndex];
    this.currentLevel = this.levelData.index;
    this.powerCooldown = false;
    this.shootCooldown = false;
    this._touchMoveActive = false;
    this._touchTarget = null;
    this._pointerDownTime = 0;

    // Celowanie i parametry pocisków
    this.aimTarget = null;        
    this.aimPower = 1;           
    this.aimCharging = false;
    this.aimChargeStart = 0;
    this.aimMaxPower = 2.5;      
    this.aimMinPower = 0.8;      
  }

  create() {
    if (music1 && music1.isPlaying) music1.stop();
    if (!music2) music2 = this.sound.add('track2', { loop: true, volume: globalVolume });
    try { if (!music2.isPlaying) music2.play(); } catch(e) {}

    this.add.image(640, 360, this.levelData.bg).setDisplaySize(1280, 720);

    this.hero = this.physics.add.sprite(100, 450, 'hero_sheet', 0);
    this.hero.setOrigin(0.5, 1);
    this.hero.setScale(1);
    this.hero.setCollideWorldBounds(true);
    this.hero.setSize(40, 90);
    this.hero.setOffset(40, 26);
    
    if (this.hero.body) { this.hero.body.immovable = false; this.hero.body.moves = true; this.hero.body.enable = true; }

    this.trolls = this.physics.add.group({ classType: Phaser.Physics.Arcade.Sprite, runChildUpdate: true, maxSize: 100 });
    this.bullets = this.physics.add.group();

    this.trollsLeft = this.levelData.horde;
    this.trollsSpawned = 0;

    this.uiText = this.add.text(30, 30, `${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`, { fontSize: '26px', fill: '#fff', stroke: '#000', strokeThickness: 5 });

    this.spawnTimer = this.time.addEvent({ delay: 2000, callback: this.spawnTrollCall, callbackScope: this, loop: true });

    // ✅ ZAKOMENTOWANO/USUNIĘTO STARE COLLIDERY - Czysty overlap zapobiega tunelowaniu pocisków
    this.physics.add.overlap(this.bullets, this.trolls, this.hitTroll, null, this);
    this.physics.add.overlap(this.hero, this.trolls, this.playerHit, null, this);

    this.cursors = this.input.keyboard.createCursorKeys();
    this.keys = this.input.keyboard.addKeys({
      up: Phaser.Input.Keyboard.KeyCodes.W,
      left: Phaser.Input.Keyboard.KeyCodes.A,
      down: Phaser.Input.Keyboard.KeyCodes.S,
      right: Phaser.Input.Keyboard.KeyCodes.D,
      shoot: Phaser.Input.Keyboard.KeyCodes.K,
      power: Phaser.Input.Keyboard.KeyCodes.L,
      arrowUp: Phaser.Input.Keyboard.KeyCodes.UP,
      arrowLeft: Phaser.Input.Keyboard.KeyCodes.LEFT,
      arrowDown: Phaser.Input.Keyboard.KeyCodes.DOWN,
      arrowRight: Phaser.Input.Keyboard.KeyCodes.RIGHT
    });

    this.createTouchButtons();

    this.reticle = this.add.circle(0, 0, 10, 0xffcc00, 0.6).setScrollFactor(0).setVisible(false).setDepth(20);
    this.setupPointerControls();

    if (this.anims.exists('hero-run')) this.hero.play('hero-run');

    // ✅ ZAKTUALIZOWANO: Przygotowanie warstwy debugGraphics (domyślnie ukryta)
    this.debugGraphics = this.add.graphics();
    this.debugGraphics.setDepth(1000);
    this.debugGraphics.setVisible(false);

    console.log('Hero body exists:', !!(this.hero && this.hero.body));
  }

  setupPointerControls() {
    this.input.on('pointerdown', (pointer) => {
      const w = this.cameras.main.width;
      if (pointer.x > w * 0.5) {
        this.aimCharging = true;
        this.aimChargeStart = this.time.now;
        this.aimTarget = { x: pointer.worldX, y: pointer.worldY };
        
        this.reticle.setVisible(true);
        this.reticle.x = pointer.x;
        this.reticle.y = pointer.y;

        this._pointerDownTime = this.time.now;
      } else {
        this._touchMoveActive = true;
        this._touchTarget = { x: pointer.worldX, y: pointer.worldY };
      }
    });

    this.input.on('pointerup', (pointer) => {
      const w = this.cameras.main.width;
      if (pointer.x > w * 0.5) {
        const dt = Math.max(0, this.time.now - (this.aimChargeStart || 0));
        const chargeRatio = Math.min(1, dt / 800); 
        const power = this.aimMinPower + (this.aimMaxPower - this.aimMinPower) * chargeRatio;
        
        this.aimCharging = false;
        this.aimChargeStart = 0;

        const tx = pointer.worldX || (this.aimTarget && this.aimTarget.x);
        const ty = pointer.worldY || (this.aimTarget && this.aimTarget.y);
        
        if (tx && ty) this.shootAt(tx, ty, power);

        this.aimTarget = null;
        this.reticle.setVisible(false);
        this._pointerDownTime = 0;
      } else {
        this._touchMoveActive = false;
        this._touchTarget = null;
      }
    });

    this.input.on('pointermove', (pointer) => {
      if (pointer.isDown) {
        if (pointer.x > this.cameras.main.width * 0.5) {
          if (this.aimCharging) {
            this.reticle.setVisible(true);
            this.reticle.x = pointer.x;
            this.reticle.y = pointer.y;
            this.aimTarget = { x: pointer.worldX, y: pointer.worldY };
          }
        } else {
          this._touchTarget = { x: pointer.worldX, y: pointer.worldY };
        }
      }
    });
  }

  createTouchButtons() {
    const w = this.cameras.main.width, h = this.cameras.main.height;
    const btnSize = Math.round(Math.min(w, h) * 0.12);

    this.leftTouchZone = this.add.rectangle(btnSize/2 + 10, h - btnSize/2 - 10, btnSize, btnSize, 0x000000, 0)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor: true, hitArea: new Phaser.Geom.Rectangle(0,0,btnSize,btnSize), hitAreaCallback: Phaser.Geom.Rectangle.Contains });

    this.leftTouchZone.on('pointerdown', (p) => { this._touchMoveActive = true; this._touchTarget = { x: p.worldX, y: p.worldY }; });
    this.leftTouchZone.on('pointerup', () => { this._touchMoveActive = false; this._touchTarget = null; });
    this.leftTouchZone.on('pointermove', (p) => { if (p.isDown) this._touchTarget = { x: p.worldX, y: p.worldY }; });

    this.rightBtn = this.add.circle(w - btnSize/2 - 10, h - btnSize/2 - 10, btnSize/2, 0xffffff, 0)
      .setScrollFactor(0)
      .setInteractive({ useHandCursor: true });
    
    this.rightBtn.on('pointerdown', (p) => { 
      this.aimCharging = true;
      this.aimChargeStart = this.time.now;
      this.shoot(); 
    });
    this.rightBtn.on('pointerup', (p) => { 
      const dt = this.time.now - (this.aimChargeStart || 0); 
      if (dt > 400 && !this.powerCooldown) { this.usePower(); } 
      this.aimCharging = false;
      this.aimChargeStart = 0;
    });
  }

  spawnTrollCall() {
    const spawnY = Phaser.Math.Between(220, 560);
    this.spawnTroll(1350, spawnY);
  }

  // ✅ WROŻONO: Zaktualizowana, pewna funkcja spawnTroll z powiększeniem displaySize i updateFromGameObject()
  spawnTroll(x = 1350, y = 560) {
    if (this.trollsSpawned >= this.levelData.horde) return;
    const level = this.currentLevel || 1;

    this.trolls.children.iterate(troll => {
      if (troll && troll.active && Math.abs(troll.x - x) < 80) x += Phaser.Math.Between(70, 130);
    });

    const types = (this.levelData.types || []).filter(t => this.textures.exists(t));
    if (types.length === 0) {
      console.warn('Brak załadowanych tekstur dla tego poziomu:', this.levelData.types);
      return;
    }
    const type = Phaser.Utils.Array.GetRandom(types);

    let t = this.trolls.get(x, y, type);
    if (!t) return;

    t.setTexture(type);
    t.enableBody(true, x, y, true, true);
    t.setActive(true);
    t.setVisible(true);
    t.setOrigin(0.5, 1);

    // BAZOWY rozmiar i powiększenie: dodatkowe +10% (scaleFactor = 1.10)
    const baseSize = 90;
    const scaleFactor = 1.10; 
    const displaySize = Math.round(baseSize * scaleFactor);

    // Ustaw display i hitbox tak, by idealnie pokrywały cały rzut graficzny trolla
    t.setDisplaySize(displaySize, displaySize);
    t.setSize(displaySize, displaySize);
    t.setOffset(0, 0);

    // HP zależne od poziomu
    t.hp = (this.currentLevel === 1) ? 1 :
           (this.currentLevel === 2) ? 2 :
           (this.currentLevel === 3) ? 3 : 1;

    // Inicjalizacja fizyki i wymuszenie natychmiastowej aktualizacji rzutu geometrii Arcade
    if (t.body) {
      t.body.setAllowGravity(false);
      t.body.immovable = false;
      t.body.moves = true;
      t.body.updateFromGameObject();
    }

    const baseSpeed = this.currentLevel === 3 ? -160 : this.currentLevel === 2 ? -140 : -120;
    t.setVelocityX(baseSpeed);
    t.setFlipX(true);

    if (t._tween) { t._tween.stop(); t._tween = null; }

    t._tween = this.tweens.add({
      targets: t,
      props: [
        { y: { value: t.y - Phaser.Math.Between(6, 12), duration: 900, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 } },
        { scaleX: { value: scaleFactor * 1.03, duration: 900, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 },
          scaleY: { value: scaleFactor * 0.97, duration: 900, ease: 'Sine.easeInOut', yoyo: true, repeat: -1 } }
      ],
      loop: -1
    });

    this.trollsSpawned++;
  }

  // ✅ WROŻONO: Zaktualizowana, bezpieczna funkcja hitTroll rozliczająca obrażenia i gasząca tweens
  hitTroll(bullet, troll) {
    // Natychmiastowo wyłączamy pocisk z pętli Arcade, by wykluczyć ponowną detekcję w tej samej klatce
    if (bullet && bullet.active) {
      bullet.disableBody(true, true);
    }

    if (!troll || !troll.active) return;

    troll.hp = (typeof troll.hp === 'number') ? troll.hp - 1 : 0;
    troll.setTint(0xff5555);
    this.time.delayedCall(120, () => { if (troll && troll.active) troll.clearTint(); });

    if (troll.hp <= 0) {
      // Pewne zatrzymanie bujania i pulsu przed zwrotem do puli obiektów
      if (troll._tween) { troll._tween.stop(); troll._tween = null; }
      
      troll.disableBody(true, true);
      this.trollsLeft = Math.max(0, this.trollsLeft - 1);
      this.uiText.setText(`${this.levelData.name}\nPozostałe trole: ${this.trollsLeft}`);
      if (this.trollsLeft <= 0) this.checkVictory();
    } else {
      if (troll.body) troll.setVelocityX((troll.body.velocity.x || -120) * 1.2);
    }
  }

  // ✅ WROŻONO: Zaktualizowana, odporna na tunelowanie metoda budowania pocisków shootAt()
  shootAt(targetX, targetY, power = 1) {
    if (!this.hero || !this.hero.active) return;

    const startX = this.hero.x + (this.hero.flipX ? -30 : 30);
    const startY = this.hero.y - 40;

    let bullet = this.bullets.getFirstDead();
    if (!bullet) {
      bullet = this.physics.add.image(startX, startY, 'hpower2');
      this.bullets.add(bullet);
    } else {
      bullet.enableBody(true, startX, startY, true, true);
      bullet.setTexture('hpower2');
    }

    bullet.setActive(true);
    bullet.setVisible(true);
    bullet.setDisplaySize(40, 40);
    
    if (bullet.body) {
      bullet.body.setSize(30, 30);
      bullet.body.allowGravity = false;
      bullet.body.checkCollision.up = true;
      bullet.body.checkCollision.down = true;
      bullet.body.checkCollision.left = true;
      bullet.body.checkCollision.right = true;
      // Wymuszenie rzutu geometrii sprajta pocisku na silnik fizyki Arcade
      bullet.body.updateFromGameObject();
    }
    bullet.setDepth(10);

    const dx = targetX - startX;
    const dy = targetY - startY;
    const angle = Math.atan2(dy, dx);
    const baseSpeed = 600; 
    const speed = baseSpeed * power; 

    bullet.body.velocity.x = Math.cos(angle) * speed;
    bullet.body.velocity.y = Math.sin(angle) * speed;

    if (bullet.setRotation) bullet.setRotation(angle);

    this.time.delayedCall(3000, () => {
      if (bullet && bullet.active) bullet.disableBody(true, true);
    });
  }

  shoot() {
    if (this.shootCooldown || !this.hero || !this.hero.active) return;
    this.shootCooldown = true;

    if (this.aimTarget) {
      this.shootAt(this.aimTarget.x, this.aimTarget.y, 1);
    } else {
      const forwardX = this.hero.x + (this.hero.flipX ? -400 : 400);
      const forwardY = this.hero.y - 40;
      this.shootAt(forwardX, forwardY, 1);
    }

    this.time.delayedCall(350, () => this.shootCooldown = false);
  }

  usePower() {
    if (this.powerCooldown) return;
    this.powerCooldown = true;
    this.trolls.children.iterate(t => { if (t && t.active && t.body) t.setVelocityX(-300); });
    this.time.delayedCall(2000, () => { this.powerCooldown = false; });
  }

  playerHit() {
    if (this.spawnTimer) this.spawnTimer.destroy();
    if (music2 && music2.isPlaying) music2.stop();
    this.scene.start('GameOverScene');
  }

  checkVictory() {
    if (this.spawnTimer) this.spawnTimer.destroy();
    if (this.levelIndex < LEVELS.length - 1) this.scene.start('GameScene', { levelIndex: this.levelIndex + 1 });
    else this.scene.start('WinScene');
  }

  update(time, delta) {
    if (!this.hero || !this.hero.body) return;

    if (this.hero.body && !this.hero.body.enable) {
      console.warn('Hero body disabled — enabling.');
      this.hero.body.enable = true;
    }

    this.hero.setVelocity(0);

    let moving = false;
    const k = this.keys;
    if ((k.left && k.left.isDown) || (k.arrowLeft && k.arrowLeft.isDown)) { this.hero.setVelocityX(-280); moving = true; this.hero.setFlipX(true); }
    else if ((k.right && k.right.isDown) || (k.arrowRight && k.arrowRight.isDown)) { this.hero.setVelocityX(280); moving = true; this.hero.setFlipX(false); }
    if ((k.up && k.up.isDown) || (k.arrowUp && k.arrowUp.isDown)) { this.hero.setVelocityY(-280); moving = true; }
    else if ((k.down && k.down.isDown) || (k.arrowDown && k.arrowDown.isDown)) { this.hero.setVelocityY(280); moving = true; }

    if (Phaser.Input.Keyboard.JustDown(k.shoot)) { this.shoot(); }
    if (k.power && k.power.isDown && !this.powerCooldown) { this.usePower(); }

    if (this._touchMoveActive && this._touchTarget) {
      const speed = 260;
      const dx = this._touchTarget.x - this.hero.x;
      const dy = this._touchTarget.y - this.hero.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 8) {
        this.hero.setVelocityX((dx / dist) * speed);
        this.hero.setVelocityY((dy / dist) * speed);
        moving = true;
        this.hero.setFlipX(dx < 0);
      } else {
        this.hero.setVelocity(0);
      }
    }

    if (this.aimCharging) {
      const dt = Math.min(800, this.time.now - (this.aimChargeStart || 0));
      const ratio = dt / 800;
      const color = Phaser.Display.Color.Interpolate.ColorWithColor(
        new Phaser.Display.Color(255, 204, 0),
        new Phaser.Display.Color(255, 60, 60),
        100, Math.floor(ratio * 100)
      );
      this.reticle.fillColor = Phaser.Display.Color.GetColor(color.r, color.g, color.b);
      this.reticle.setScale(1 + ratio * 0.6);
    }

    if (moving) {
      this.hero.play('hero-run', true);
    } else {
      this.hero.anims.stop();
      this.hero.setFrame(0);
    }

    const levelSpeed = this.currentLevel === 3 ? -160 : this.currentLevel === 2 ? -140 : -120;

    // ✅ Rysowanie nakładki diagnostycznej hitboxów (Włączysz przestawiając setVisible(true) w create)
    this.debugGraphics.clear();
    if (this.debugGraphics.visible) {
      this.debugGraphics.lineStyle(1, 0x00ff00, 0.9);
      this.trolls.children.iterate(t => { if (t && t.active && t.body) this.debugGraphics.strokeRect(t.body.x, t.body.y, t.body.width, t.body.height); });
      this.debugGraphics.lineStyle(1, 0xff0000, 0.9);
      this.bullets.children.iterate(b => { if (b && b.active && b.body) this.debugGraphics.strokeRect(b.body.x, b.body.y, b.body.width, b.body.height); });
    }

    this.trolls.children.iterate(t => {
      if (!t || !t.active || !t.body) return;
      if (Math.abs(t.body.velocity.x) < 1) t.setVelocityX(levelSpeed);
      if (t.x < -100) {
        if (t._tween) { t._tween.stop(); t._tween = null; }
        t.disableBody(true, true);
      }
    });
  }
}

// -------------------- GameOverScene --------------------
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  create() {
    if (music2 && music2.isPlaying) music2.stop();
    this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.85);
    this.add.text(640, 300, "KONIEC GRY\nTwoja twarz została skradziona!", { align: 'center', fontSize: '42px', fill: '#ff5555', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    let btn = this.add.rectangle(640, 460, 320, 60, 0xffffff).setInteractive({ useHandCursor: true });
    this.add.text(640, 460, "MENU GŁÓWNE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    btn.on('pointerdown', () => this.scene.start('StartScene'));
  }
}

// -------------------- WinScene --------------------
class WinScene extends Phaser.Scene {
  constructor() { super('WinScene'); }
  create() {
    if (music2 && music2.isPlaying) music2.stop();
    this.add.rectangle(640, 360, 1280, 720, 0x000000, 0.9);
    this.add.text(640, 180, "🎉 GRATULACJE! 🎉", { fontSize: '64px', fill: '#55ff55', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    this.add.text(640, 280, "Udało Ci się przejść wszystkie poziomy hordy!", { align: 'center', fontSize: '28px', fill: '#fff', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    let btnRepeat = this.add.rectangle(640, 440, 320, 70, 0x55ff55).setInteractive({ useHandCursor: true });
    this.add.text(640, 440, "ZAGRAJ PONOWNIE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    btnRepeat.on('pointerdown', () => this.scene.start('GameScene', { levelIndex: 0 }));
    let btnMenu = this.add.rectangle(640, 540, 320, 70, 0xffffff).setInteractive({ useHandCursor: true }).setStrokeStyle(3, 0x55ff55);
    this.add.text(640, 540, "MENU GŁÓWNE", { fontSize: '24px', fill: '#000', fontStyle: 'bold', fontFamily: 'Arial' }).setOrigin(0.5);
    btnMenu.on('pointerdown', () => this.scene.start('StartScene'));
  }
}

// -------------------- Konfiguracja i start --------------------
const config = {
  type: Phaser.AUTO,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 1280, height: 720 },
  input: { activePointers: 3 },
  physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
  scene: [BootScene, StartScene, GameScene, GameOverScene, WinScene]
};

const game = new Phaser.Game(config);
console.log('Gra uruchomiona!');
